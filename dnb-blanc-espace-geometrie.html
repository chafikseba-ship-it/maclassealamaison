<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNB blanc — Espace et géométrie </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --creme:#FFF6E6;--creme2:#FFF0D6;--jaune:#FFC93C;--jaune-fonce:#E0A415;
    --vert:#9FD356;--vert-fonce:#6FA52A;--orange:#FF9F45;--orange-fonce:#E07A1F;
    --rouge:#E76F51;--brun:#5A4A2F;--brun-clair:#8A744C;--blanc:#FFFFFF;--ombre:rgba(120,90,30,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--creme);color:var(--brun);min-height:100vh;padding:18px 14px 90px;-webkit-text-size-adjust:100%;}
  h1,h2,h3,.titre{font-family:'Fredoka',sans-serif;}
  .wrap{max-width:680px;margin:0 auto;}
  .barre-test{background:#3a3a3a;color:#fff;border-radius:16px;padding:10px 14px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:'Fredoka';font-size:14px;}
  .barre-test .etiq{background:var(--rouge);padding:3px 10px;border-radius:10px;font-weight:600;}
  .barre-test button{font-family:'Fredoka';font-size:14px;border:none;cursor:pointer;background:#5a5a5a;color:#fff;border-radius:12px;padding:7px 12px;font-weight:500;}
  .barre-test button:hover{background:#6a6a6a;}
  .entete{background:linear-gradient(135deg,var(--jaune),var(--orange));border-radius:24px;padding:22px;color:#fff;text-align:center;box-shadow:0 6px 0 var(--orange-fonce);margin-bottom:18px;}
  .entete h1{font-size:26px;font-weight:600;text-shadow:0 2px 0 rgba(0,0,0,.12);}
  .entete p{font-weight:700;opacity:.95;margin-top:4px;}
  .progression{display:flex;gap:6px;margin-bottom:18px;}
  .progression .pas{flex:1;height:10px;border-radius:6px;background:var(--creme2);box-shadow:inset 0 2px 4px var(--ombre);}
  .progression .pas.fait{background:var(--vert);}
  .progression .pas.actif{background:var(--jaune);}
  .carte{background:var(--blanc);border-radius:22px;padding:22px;box-shadow:0 5px 0 var(--ombre);margin-bottom:18px;}
  .carte h2{font-size:21px;color:var(--brun);margin-bottom:6px;font-weight:600;}
  .carte h2 .num{color:var(--orange-fonce);}
  .badge-theme{display:inline-block;background:var(--vert);color:#fff;font-family:'Fredoka';font-weight:600;font-size:13px;padding:4px 12px;border-radius:20px;margin-bottom:12px;}
  .consigne{font-size:17px;line-height:1.5;margin:10px 0;}
  .sous{color:var(--brun-clair);font-weight:600;font-size:15px;}
  .btn{font-family:'Fredoka';font-weight:600;font-size:18px;border:none;cursor:pointer;border-radius:18px;padding:14px 22px;color:#fff;transition:transform .05s,box-shadow .05s;display:inline-block;}
  .btn-vert{background:var(--vert);box-shadow:0 5px 0 var(--vert-fonce);}
  .btn-jaune{background:var(--jaune);color:var(--brun);box-shadow:0 5px 0 var(--jaune-fonce);}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--vert-fonce);}
  .btn-jaune:active{box-shadow:0 1px 0 var(--jaune-fonce);}
  .ligne-btn{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .figure{background:var(--creme2);border-radius:18px;padding:14px;text-align:center;margin:14px 0;}
  .figure svg{max-width:100%;height:auto;}
  .qbloc{margin:20px 0 6px;padding:13px 15px;background:linear-gradient(135deg,#FFE7B0,#FFD98A);border-radius:14px;box-shadow:0 3px 0 rgba(180,140,40,.2);}
  .qbloc h3{font-size:18px;color:var(--brun);font-weight:600;}
  .qbloc p{font-size:15px;line-height:1.45;margin-top:5px;}
  .etape{border-radius:16px;padding:14px;margin:10px 0;background:var(--creme);border:2px solid var(--creme2);transition:opacity .3s;}
  .etape.verrou{opacity:.45;pointer-events:none;}
  .etape.ok{border-color:var(--vert);background:#f3faea;}
  .etape .role{font-family:'Fredoka';font-weight:600;color:var(--orange-fonce);font-size:14px;text-transform:uppercase;letter-spacing:.5px;}
  .etape .q{font-size:16px;margin:6px 0 10px;line-height:1.45;}
  .etape input[type=text]{font-family:'Nunito';font-size:18px;font-weight:700;width:100%;padding:12px 14px;border:2px solid var(--brun-clair);border-radius:12px;background:#fff;color:var(--brun);}
  .etape input[type=text]:focus{outline:none;border-color:var(--jaune);}
  .ligne-valid{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
  .msg{font-weight:700;font-size:15px;margin-top:8px;}
  .msg.bon{color:var(--vert-fonce);}
  .msg.faux{color:var(--rouge);}
  .aide{background:#FFF3D0;border-left:5px solid var(--jaune);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:15px;}
  .solution{background:#eef7df;border-left:5px solid var(--vert);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:15px;}
  .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 4px;}
  .frac .num{padding:0 6px 2px;border-bottom:2.5px solid var(--brun);}
  .frac .den{padding:2px 6px 0;}
  .frac-saisie{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;}
  .frac-saisie input{width:140px;text-align:center;font-family:'Nunito';font-weight:700;font-size:18px;border:2px solid var(--brun-clair);border-radius:8px;padding:6px;background:#fff;color:var(--brun);}
  .frac-saisie .barre-frac{height:3px;background:var(--brun);margin:4px 0;border-radius:2px;}
  #btn-calc{position:fixed;right:18px;bottom:18px;z-index:50;width:60px;height:60px;border-radius:50%;background:var(--orange);color:#fff;border:none;cursor:pointer;font-size:26px;box-shadow:0 5px 0 var(--orange-fonce);}
  #btn-calc:active{transform:translateY(4px);box-shadow:0 1px 0 var(--orange-fonce);}
  #calc{position:fixed;right:18px;bottom:88px;z-index:51;width:300px;max-width:calc(100vw - 36px);max-height:calc(100vh - 120px);overflow-y:auto;background:var(--blanc);border-radius:20px;box-shadow:0 8px 24px rgba(80,60,20,.3);padding:14px;display:none;}
  #calc.ouvert{display:block;}
  #calc .affichage{position:sticky;top:0;z-index:2;background:var(--creme);border-radius:12px;padding:14px;font-family:'Fredoka';font-weight:600;font-size:24px;text-align:right;min-height:52px;word-break:break-all;margin-bottom:10px;color:var(--brun);border:2px solid var(--jaune);}
  #calc .mode{font-size:12px;color:var(--brun-clair);text-align:right;margin-bottom:6px;font-weight:700;}
  #calc .envoyer{width:100%;margin-top:8px;font-family:'Fredoka';font-weight:600;font-size:15px;border:none;cursor:pointer;background:var(--vert);color:#fff;border-radius:12px;padding:12px;box-shadow:0 4px 0 var(--vert-fonce);}
  #calc .envoyer:active{transform:translateY(3px);box-shadow:0 1px 0 var(--vert-fonce);}
  .grille-calc{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .grille-calc button{font-family:'Fredoka';font-weight:500;font-size:16px;border:none;cursor:pointer;border-radius:10px;padding:11px 0;background:var(--creme2);color:var(--brun);}
  .grille-calc button:active{transform:translateY(2px);}
  .grille-calc button.op{background:var(--jaune);}
  .grille-calc button.fct{background:var(--vert);color:#fff;font-size:14px;}
  .grille-calc button.eg{background:var(--orange);color:#fff;}
  .clavier-sym{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .clavier-sym button{font-family:'Fredoka';font-weight:600;font-size:16px;border:none;cursor:pointer;background:var(--creme2);color:var(--brun);border-radius:10px;padding:8px 13px;min-width:42px;box-shadow:0 3px 0 var(--ombre);}
  .clavier-sym button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ombre);}
  .fin{background:linear-gradient(135deg,var(--vert),var(--jaune));color:#fff;text-align:center;}
  .fin h2{font-size:24px;}
  .cache{display:none;}
  .btn-retour{display:inline-flex;align-items:center;gap:6px;font-family:'Fredoka';font-weight:600;font-size:16px;
    background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);color:#fff;border-radius:12px;
    padding:8px 14px;cursor:pointer;text-decoration:none;margin-bottom:10px;transition:background .12s}
  .btn-retour:hover{background:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="wrap">
    <a href="index.html" class="btn-retour">← Accueil</a>
<div class="entete"><h1>DNB blanc</h1><p>Espace et géométrie</p></div>
  <div class="progression" id="progression"></div>
  <div id="zone-ecrans"></div>
</div>

<button id="btn-calc" onclick="toggleCalc()" aria-label="Calculatrice">&#x1F9EE;</button>
<div id="calc" role="dialog" aria-label="Calculatrice">
  <div class="mode">degrés (°)</div>
  <div class="affichage" id="calc-ecran">0</div>
  <div class="grille-calc">
    <button class="fct" onclick="cTok('cos(')">cos</button><button class="fct" onclick="cTok('sin(')">sin</button><button class="fct" onclick="cTok('tan(')">tan</button><button class="op" onclick="cClear()">C</button>
    <button class="fct" onclick="cTok('cos⁻¹(')">cos⁻¹</button><button class="fct" onclick="cTok('sin⁻¹(')">sin⁻¹</button><button class="fct" onclick="cTok('tan⁻¹(')">tan⁻¹</button><button class="op" onclick="cBack()">&#x232B;</button>
    <button onclick="cTok('7')">7</button><button onclick="cTok('8')">8</button><button onclick="cTok('9')">9</button><button class="op" onclick="cTok('÷')">÷</button>
    <button onclick="cTok('4')">4</button><button onclick="cTok('5')">5</button><button onclick="cTok('6')">6</button><button class="op" onclick="cTok('×')">×</button>
    <button onclick="cTok('1')">1</button><button onclick="cTok('2')">2</button><button onclick="cTok('3')">3</button><button class="op" onclick="cTok('-')">&#x2212;</button>
    <button onclick="cTok('0')">0</button><button onclick="cTok('.')">,</button><button class="op" onclick="cTok('√(')">&#x221A;</button><button class="op" onclick="cTok('+')">+</button>
    <button class="op" onclick="cTok('(')">(</button><button class="op" onclick="cTok(')')">)</button><button class="op" onclick="cTok('^2')">x²</button><button class="eg" onclick="cEgal()">=</button>
  </div>
  <button class="envoyer" onclick="cEnvoyer()">&#x2B06; Envoyer le résultat dans la réponse</button>
</div>

<script>
/* ===== OUTILS ===== */
function rnd(n){return Math.floor(Math.random()*n);}
function choix(t){return t[rnd(t.length)];}
function melange(t){t=t.slice();for(let i=t.length-1;i>0;i--){let j=rnd(i+1);[t[i],t[j]]=[t[j],t[i]];}return t;}
function lettresDistinctes(k){const a="ABCDEFGHJKLMNPQRSTUVWXYZ".split("");return melange(a).slice(0,k);}
function fr(x){return (''+x).replace('.',',');}

/* ===== NORMALISATION ===== */
function norm(inp){return (inp==null?"":inp.toString()).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/²/g,'^2').replace(/\s+/g,'').replace(/,/g,'.').replace(/\*/g,'');}
function seg(a,b){return [(''+a).toLowerCase(),(''+b).toLowerCase()].sort().join('');}
function memeEnsemble(a,b){if(a.length!==b.length)return false;const x=a.slice().sort(),y=b.slice().sort();return x.every((v,i)=>v===y[i]);}
function segsCarres(inp){const t=norm(inp);return (t.match(/[a-z]{2}\^2/g)||[]).map(m=>seg(m[0],m[1]));}
function nbsCarres(inp){return (norm(inp).match(/\d+(\.\d+)?\^2/g)||[]).map(x=>parseFloat(x));}
function nbs(inp){return (norm(inp).match(/\d+(\.\d+)?/g)||[]).map(x=>parseFloat(x));}

/* ===== CALCULATRICE ===== */
let calcExpr="";
function cosd(x){return Math.cos(x*Math.PI/180);}
function sind(x){return Math.sin(x*Math.PI/180);}
function tand(x){return Math.tan(x*Math.PI/180);}
function acosd(x){return Math.acos(x)*180/Math.PI;}
function asind(x){return Math.asin(x)*180/Math.PI;}
function atand(x){return Math.atan(x)*180/Math.PI;}
function toggleCalc(){var cal=document.getElementById('calc');cal.classList.toggle('ouvert');if(cal.classList.contains('ouvert')){var active=document.activeElement;if(active&&active.matches&&active.matches('.etape input[type=text]')){dernierChamp=active;active.blur();}}}
function majEcran(){document.getElementById('calc-ecran').textContent=calcExpr||"0";}
function cTok(t){calcExpr+=t;majEcran();}
function cClear(){calcExpr="";majEcran();}
function cBack(){const tk=['cos⁻¹(','sin⁻¹(','tan⁻¹(','cos(','sin(','tan(','√(','^2'];for(const x of tk){if(calcExpr.endsWith(x)){calcExpr=calcExpr.slice(0,-x.length);majEcran();return;}}calcExpr=calcExpr.slice(0,-1);majEcran();}
function calcEval(expr){
  let e=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/,/g,'.').replace(/π/g,'Math.PI').replace(/√/g,'Math.sqrt').replace(/\^/g,'**')
    .replace(/cos⁻¹/g,'acosd').replace(/sin⁻¹/g,'asind').replace(/tan⁻¹/g,'atand')
    .replace(/\bcos\b/g,'cosd').replace(/\bsin\b/g,'sind').replace(/\btan\b/g,'tand');
  if(/[a-z]/i.test(e.replace(/Math|cosd|sind|tand|acosd|asind|atand|sqrt|PI|e/gi,''))) throw new Error("invalide");
  return Function('cosd','sind','tand','acosd','asind','atand','"use strict";return ('+e+');')(cosd,sind,tand,acosd,asind,atand);
}
function cEgal(){try{let r=calcEval(calcExpr);if(typeof r!=='number'||!isFinite(r))throw 0;r=Math.round(r*1e6)/1e6;calcExpr=fr(r);majEcran();}catch(e){document.getElementById('calc-ecran').textContent="erreur";calcExpr="";}}

/* ===== CHAMP ACTIF + INSERTION ===== */
let dernierChamp=null;
function inserer(champ,txt){if(!champ||champ.disabled)return;const d=(champ.selectionStart!=null)?champ.selectionStart:champ.value.length;const f=(champ.selectionEnd!=null)?champ.selectionEnd:champ.value.length;champ.value=champ.value.slice(0,d)+txt+champ.value.slice(f);const p=d+txt.length;champ.focus();try{champ.setSelectionRange(p,p);}catch(e){}dernierChamp=champ;}
function symPress(ev,btn,sym){ev.preventDefault();const etape=btn.closest('.etape');let champ=(dernierChamp&&etape.contains(dernierChamp)&&!dernierChamp.disabled)?dernierChamp:etape.querySelector('input[type=text]:not([disabled])');inserer(champ,sym);}
function cEnvoyer(){if(dernierChamp&&!dernierChamp.disabled){inserer(dernierChamp,calcExpr);}else{const e=document.getElementById('calc-ecran');const t=e.textContent;e.textContent="clique d'abord dans une réponse";setTimeout(()=>{e.textContent=t;},1400);}}

/* ===== MOTEUR REDACTION GUIDEE (avec en-têtes de question) ===== */
function construireRedaction(conteneurId, etapes, onFini){
  const cont=document.getElementById(conteneurId);cont.innerHTML="";
  etapes.forEach((et,i)=>{
    if(et.question){
      const h=document.createElement('div');h.className='qbloc';
      h.innerHTML=`<h3>${et.question}</h3>${et.consigneQ?`<p>${et.consigneQ}</p>`:''}`;
      cont.appendChild(h);
    }
    const div=document.createElement('div');
    div.className='etape'+(i===0?'':' verrou');div.dataset.i=i;
    let saisieHTML=(et.type==='fraction')
      ? `<div class="frac-saisie"><input type="text" data-r="num" placeholder="numérateur"><div class="barre-frac"></div><input type="text" data-r="den" placeholder="dénominateur"></div>`
      : `<input type="text" placeholder="Écris ici…">`;
    let clavierHTML='';
    if(et.clavier&&et.clavier.length){
      clavierHTML='<div class="clavier-sym">'+et.clavier.map(sym=>`<button type="button" onmousedown="symPress(event,this,'${(''+sym).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${sym}</button>`).join('')+'</div>';
    }
    div.innerHTML=`<div class="role">${et.role}</div><div class="q">${et.q}</div>${saisieHTML}${clavierHTML}<div class="ligne-valid"><button class="btn btn-jaune" style="font-size:16px;padding:10px 18px" onclick="validerEtape('${conteneurId}',${i})">Valider</button></div><div class="msg" data-msg></div><div data-aide></div>`;
    cont.appendChild(div);
  });
  cont.__etapes=etapes;cont.__erreurs=etapes.map(()=>0);cont.__onFini=onFini;
}
function validerEtape(conteneurId,i){
  const cont=document.getElementById(conteneurId);const etapes=cont.__etapes;
  const div=cont.querySelector('.etape[data-i="'+i+'"]');const et=etapes[i];
  let ok;
  if(et.type==='fraction'){const num=div.querySelector('input[data-r="num"]').value;const den=div.querySelector('input[data-r="den"]').value;ok=et.verif({num,den});}
  else{ok=et.verif(div.querySelector('input[type=text]').value);}
  const msg=div.querySelector('[data-msg]');const aideBox=div.querySelector('[data-aide]');
  if(ok){
    msg.textContent="✓ Bien rédigé.";msg.className="msg bon";div.classList.add('ok');
    div.querySelectorAll('input').forEach(inp=>inp.disabled=true);div.querySelector('.ligne-valid').style.display='none';
    const suiv=cont.querySelector('.etape[data-i="'+(i+1)+'"]');
    if(suiv){suiv.classList.remove('verrou');suiv.querySelector('input').focus();}
    else if(cont.__onFini)cont.__onFini();
  }else{
    cont.__erreurs[i]++;const n=cont.__erreurs[i];
    msg.textContent="Pas encore. Relis ton écriture.";msg.className="msg faux";
    if(n>=3)aideBox.innerHTML=`<div class="solution"><b>La bonne écriture :</b><br>${et.solutionHTML}</div>`;
    else if(n>=2)aideBox.innerHTML=`<div class="aide">💡 ${et.aide}</div>`;
  }
}

/* ===== FIGURES ===== */
// Helper commun
function svgTxt(x,y,s,sz,col){
  return `<text x="${x}" y="${y}" font-family="Fredoka" font-weight="600" font-size="${sz||16}" fill="${col||'#5A4A2F'}" text-anchor="middle" dominant-baseline="middle">${s}</text>`;
}
function svgNonEchelle(W,H){
  return svgTxt(W/2,H-7,"Figure non à l'échelle",11,'#A08B6E');
}

function dessinerTriangleRectangle(cibleId,opt){
  const W=380,H=268,padX=74,padTop=52,padBot=62;
  let P={x:padX,y:H-padBot},A={x:W-padX,y:H-padBot},B={x:padX,y:padTop};
  const o=opt.orient||0,flipH=p=>({x:W-p.x,y:p.y}),flipV=p=>({x:p.x,y:H-p.y});
  if(o===1){P=flipH(P);A=flipH(A);B=flipH(B);}if(o===2){P=flipV(P);A=flipV(A);B=flipV(B);}if(o===3){P=flipV(flipH(P));A=flipV(flipH(A));B=flipV(flipH(B));}
  const cx=(P.x+A.x+B.x)/3,cy=(P.y+A.y+B.y)/3,mid=(u,v)=>({x:(u.x+v.x)/2,y:(u.y+v.y)/2});
  const clampX=x=>Math.max(26,Math.min(W-26,x)),clampY=y=>Math.max(18,Math.min(H-18,y));
  function labExt(pt,t,d){if(t===undefined||t===null||t==='')return'';let vx=pt.x-cx,vy=pt.y-cy,n=Math.hypot(vx,vy)||1;return svgTxt(clampX(pt.x+vx/n*d),clampY(pt.y+vy/n*d),t,17);}
  function carreAngle(){const t=15;const ux=A.x-P.x,uy=A.y-P.y,lu=Math.hypot(ux,uy);const vx=B.x-P.x,vy=B.y-P.y,lv=Math.hypot(vx,vy);const p1={x:P.x+ux/lu*t,y:P.y+uy/lu*t};const p2={x:P.x+vx/lv*t,y:P.y+vy/lv*t};const p3={x:p1.x+vx/lv*t,y:p1.y+vy/lv*t};return `<polyline points="${p1.x},${p1.y} ${p3.x},${p3.y} ${p2.x},${p2.y}" fill="none" stroke="#5A4A2F" stroke-width="2"/>`;}
  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Triangle rectangle"><polygon points="${P.x},${P.y} ${A.x},${A.y} ${B.x},${B.y}" fill="#FFE7B0" stroke="#E0A415" stroke-width="3" stroke-linejoin="round"/>${carreAngle()}${labExt(P,opt.droit,22)}${labExt(A,opt.s1,22)}${labExt(B,opt.s2,22)}${labExt(mid(P,A),opt.cote1Label,28)}${labExt(mid(P,B),opt.cote2Label,32)}${labExt(mid(A,B),opt.hypLabel,28)}${svgNonEchelle(W,H)}</svg>`;
  document.getElementById(cibleId).innerHTML=svg;
}

function dessinerRampe(cibleId,opt){
  const W=420,H=262,groundY=205;
  let A={x:70,y:groundY},B={x:300,y:groundY},C={x:300,y:116};
  if(opt.orient===1){const f=p=>({x:W-p.x,y:p.y});A=f(A);B=f(B);C=f(C);}
  const mid=(u,v)=>({x:(u.x+v.x)/2,y:(u.y+v.y)/2});
  // Sol hachuré
  let sol=`<line x1="18" y1="${groundY}" x2="${W-18}" y2="${groundY}" stroke="#8A744C" stroke-width="3"/>`;

function dessinerEchelle(cibleId,opt){
  // s1=A (pied échelle, bas-gauche), droit=B (pied mur, bas-droite angle droit), s2=C (haut mur)
  const W=420,H=278;
  const A={x:72,y:215},B={x:320,y:215},C={x:320,y:58};
  // Sol hachuré
  let sol=`<line x1="18" y1="${A.y}" x2="${W-18}" y2="${A.y}" stroke="#8A744C" stroke-width="3"/>`;
  for(let x=30;x<W-22;x+=22){sol+=`<line x1="${x}" y1="${A.y}" x2="${x-9}" y2="${A.y+11}" stroke="#C9B68A" stroke-width="1.5"/>`;}
  // Mur (vertical droite) avec briques
  let mur=`<rect x="${B.x}" y="${C.y-10}" width="30" height="${A.y-(C.y-10)}" rx="2" fill="#EFE0C0" stroke="#C9A24A" stroke-width="2"/>`;
  for(let y=C.y+6;y<A.y;y+=18){mur+=`<line x1="${B.x}" y1="${y}" x2="${B.x+30}" y2="${y}" stroke="#C9A24A" stroke-width="1"/>`;}
  // Angle droit en B
  const sq=`<polyline points="${B.x-14},${B.y} ${B.x-14},${B.y-14} ${B.x},${B.y-14}" fill="none" stroke="#5A4A2F" stroke-width="2"/>`;
  // Échelle avec deux montants et barreaux
  const dx=C.x-A.x,dy=C.y-A.y,len=Math.hypot(dx,dy);
  const ux=dx/len,uy=dy/len,px=-uy*9,py=ux*9;
  let ladder=`<line x1="${A.x+px}" y1="${A.y+py}" x2="${C.x+px}" y2="${C.y+py}" stroke="#8A6650" stroke-width="2.5"/>`;
  ladder+=`<line x1="${A.x-px}" y1="${A.y-py}" x2="${C.x-px}" y2="${C.y-py}" stroke="#8A6650" stroke-width="2.5"/>`;
  for(let i=1;i<=6;i++){const tf=i/7;const rx=A.x+dx*tf,ry=A.y+dy*tf;ladder+=`<line x1="${rx+px}" y1="${ry+py}" x2="${rx-px}" y2="${ry-py}" stroke="#8A6650" stroke-width="2"/>`;}
  // Labels sommets
  const midAC_x=(A.x+C.x)/2-26,midAC_y=(A.y+C.y)/2;
  const vLabs=svgTxt(A.x-2,A.y+22,opt.s1||'A',17)+svgTxt(B.x+22,B.y+22,opt.droit||'B',17)+svgTxt(C.x+26,C.y-4,opt.s2||'C',17);
  // Labels côtés mesures
  const measLabels=(opt.cote1Label?svgTxt((A.x+B.x)/2,A.y+28,opt.cote1Label,15,'#E07A1F'):'')+
    (opt.cote2Label?svgTxt(B.x+42,(B.y+C.y)/2,opt.cote2Label,15,'#E07A1F'):'')+
    (opt.hypLabel?svgTxt(midAC_x,midAC_y,opt.hypLabel,15,'#E07A1F'):'');
  // Labels contextuels
  const ctx=svgTxt((A.x+B.x)/2,A.y-17,'sol',12,'#A08B6E')+svgTxt(B.x+62,(B.y+C.y)/2,'mur',12,'#A08B6E')+svgTxt(midAC_x-30,midAC_y-22,'échelle',12,'#A08B6E');
  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Échelle contre un mur">${sol}${mur}${sq}${ladder}${vLabs}${measLabels}${ctx}${svgNonEchelle(W,H)}</svg>`;
  document.getElementById(cibleId).innerHTML=svg;
}

  const measH=svgTxt(midBC.x, midBC.y, opt.hLabel===undefined?'?':(opt.hLabel+' m'), 14, '#E07A1F');

  // Textes contextuels
  const ctx=svgTxt(B.x+52, (B.y+C.y)/2+20, 'dénivelé', 11, '#A08B6E')+
             svgTxt((A.x+C.x)/2-54, (A.y+C.y)/2-16, 'sentier', 11, '#A08B6E');

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pente — trigonométrie">${ciel}${colline}${sol}${chemin}${vertBC}${sq}${arcPath}${arcLbl}${hiker}${labA}${labB}${labC}${measL}${measH}${ctx}${svgNonEchelle(W,H)}</svg>`;
  document.getElementById(cibleId).innerHTML=svg;
}

function dessinerAnglesParalleles(cibleId, opt){
  const W=420, H=262;
  const ang=opt.angle||60;

  // Deux routes horizontales
  const road1=`<rect x="0" y="68" width="420" height="14" fill="#D4C5A0" stroke="#C9A24A" stroke-width="1"/>`;
  const road2=`<rect x="0" y="180" width="420" height="14" fill="#D4C5A0" stroke="#C9A24A" stroke-width="1"/>`;
  const dash1=`<line x1="0" y1="75" x2="420" y2="75" stroke="white" stroke-dasharray="14,10" stroke-width="2.5"/>`;
  const dash2=`<line x1="0" y1="187" x2="420" y2="187" stroke="white" stroke-dasharray="14,10" stroke-width="2.5"/>`;

  // Voie ferrée diagonale
  const dx=110/tand(ang);
  const Ix=210, Iy=187;
  const Jx=Math.round(Ix-dx), Jy=75;
  const extBot={x:Math.round(Ix+dx*0.8), y:Math.round(Iy+110*0.8)};
  const extTop={x:Math.round(Jx-dx*0.5), y:Math.round(Jy-110*0.5)};
  const trackLine=`<line x1="${extTop.x}" y1="${extTop.y}" x2="${extBot.x}" y2="${extBot.y}" stroke="#5A4A2F" stroke-width="5"/>`;

  // Traverses (ties)
  let ties='';
  const totalDx=extBot.x-extTop.x, totalDy=extBot.y-extTop.y;
  const len=Math.hypot(totalDx,totalDy);
  const ux=totalDx/len, uy=totalDy/len, px=-uy*7, py=ux*7;
  for(let d=18;d<len-10;d+=18){
    const tx=extTop.x+ux*d, ty=extTop.y+uy*d;
    ties+=`<line x1="${Math.round(tx+px)}" y1="${Math.round(ty+py)}" x2="${Math.round(tx-px)}" y2="${Math.round(ty-py)}" stroke="#8A6650" stroke-width="3"/>`;
  }

  // Arc α en I (orange)
  const arcR=28;
  const ang2=ang;
  const arcAlpha=`<path d="M${Ix+arcR},${Iy} A${arcR},${arcR} 0 0,0 ${Math.round(Ix+arcR*cosd(180-ang2))},${Math.round(Iy-arcR*sind(180-ang2))}" fill="none" stroke="#E07A1F" stroke-width="2"/>`;
  const labAlpha=svgTxt(Ix+arcR+14, Iy-14, opt.nomAlpha||'α', 14, '#E07A1F');
  const labAlphaVal=svgTxt(Ix+arcR+16, Iy-28, ang+'°', 12, '#E07A1F');

  // Arc β en J (vert)
  const arcBeta=`<path d="M${Jx+arcR},${Jy} A${arcR},${arcR} 0 0,0 ${Math.round(Jx+arcR*cosd(180-ang2))},${Math.round(Jy-arcR*sind(180-ang2))}" fill="none" stroke="#6FA52A" stroke-width="2"/>`;
  const labBeta=svgTxt(Jx+arcR+14, Jy-14, opt.nomBeta||'β', 14, '#6FA52A');
  const labBetaQ=svgTxt(Jx+arcR+16, Jy-28, '?', 13, '#6FA52A');

  // Marques "//" parallélisme
  const mk=(px2,py2)=>`<line x1="${px2-4}" y1="${py2-8}" x2="${px2+4}" y2="${py2+8}" stroke="#6FA52A" stroke-width="2"/>
<line x1="${px2+4}" y1="${py2-8}" x2="${px2+12}" y2="${py2+8}" stroke="#6FA52A" stroke-width="2"/>`;
  const marks=mk(26,75)+mk(26,187);

  // Labels routes et transversale
  const labD1=svgTxt(28, 63, opt.nomD1||'(d₁)', 13, '#5A4A2F');
  const labD2=svgTxt(28, 202, opt.nomD2||'(d₂)', 13, '#5A4A2F');
  const labT=svgTxt(extBot.x+18, extBot.y-10, opt.nomT||'(t)', 13, '#5A4A2F');

  // Labels points I et J
  const labI=svgTxt(Ix+14, Iy+20, opt.nomI||'I', 15);
  const labJ=svgTxt(Jx-18, Jy-12, opt.nomJ||'J', 15);

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Angles alternes-internes">${road1}${road2}${dash1}${dash2}${trackLine}${ties}${arcAlpha}${labAlpha}${labAlphaVal}${arcBeta}${labBeta}${labBetaQ}${marks}${labD1}${labD2}${labT}${labI}${labJ}${svgNonEchelle(W,H)}</svg>`;
  document.getElementById(cibleId).innerHTML=svg;
}

function dessinerStade(cibleId, opt){
  const W=380, H=290, cx=190, cy=155, R=110, Ri=78;

  // Piste (anneau)
  const pisteExt=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="#E7D9B8" stroke="none"/>`;
  const gazon=`<circle cx="${cx}" cy="${cy}" r="${Ri}" fill="#9FD356" fill-opacity="0.35" stroke="none"/>`;
  const outerStroke=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#C9A24A" stroke-width="3"/>`;
  const innerStroke=`<circle cx="${cx}" cy="${cy}" r="${Ri}" fill="none" stroke="#C9A24A" stroke-width="1.5" stroke-dasharray="4,4"/>`;

  // Secteur
  const startDeg=200, endDeg=startDeg+(opt.angle||90);
  const toRad=d=>d*Math.PI/180;
  const Ax=cx+R*Math.sin(toRad(startDeg)), Ay=cy-R*Math.cos(toRad(startDeg));
  const Bx=cx+R*Math.sin(toRad(endDeg)), By=cy-R*Math.cos(toRad(endDeg));
  const largeArc=(opt.angle||90)>180?1:0;
  const secteur=`<path d="M${cx},${cy} L${Math.round(Ax)},${Math.round(Ay)} A${R},${R} 0 ${largeArc},1 ${Math.round(Bx)},${Math.round(By)} Z" fill="#FFE7B0" fill-opacity="0.7" stroke="#E0A415" stroke-width="2"/>`;
  const arcHL=`<path d="M${Math.round(Ax)},${Math.round(Ay)} A${R},${R} 0 ${largeArc},1 ${Math.round(Bx)},${Math.round(By)}" fill="none" stroke="#E07A1F" stroke-width="4"/>`;

  // Arc d'angle au centre
  const arcR2=28;
  const midDeg=(startDeg+endDeg)/2;
  const arcAngPath=`<path d="M${Math.round(cx+arcR2*Math.sin(toRad(startDeg)))},${Math.round(cy-arcR2*Math.cos(toRad(startDeg)))} A${arcR2},${arcR2} 0 ${largeArc},1 ${Math.round(cx+arcR2*Math.sin(toRad(endDeg)))},${Math.round(cy-arcR2*Math.cos(toRad(endDeg)))}" fill="none" stroke="#E07A1F" stroke-width="2"/>`;
  const angLbl=svgTxt(Math.round(cx+52*Math.sin(toRad(midDeg))), Math.round(cy-52*Math.cos(toRad(midDeg))), (opt.angle||90)+'°', 13, '#E07A1F');

  // Labels O, A, B
  const labO=svgTxt(cx+10, cy+16, opt.lO||'O', 16);
  const labA=svgTxt(Math.round(Ax-22*(Math.sin(toRad(startDeg)))), Math.round(Ay+18*(Math.cos(toRad(startDeg)))), opt.lA||'A', 16);
  const labB=svgTxt(Math.round(Bx+22*(Math.sin(toRad(endDeg+30)))), Math.round(By-18*(Math.cos(toRad(endDeg)))), opt.lB||'B', 16);

  // Label rayon
  const rMidX=Math.round((cx+Ax)/2+12), rMidY=Math.round((cy+Ay)/2-12);
  const rLabel=svgTxt(rMidX, rMidY, 'R = '+(opt.r_reel||50)+' m', 13, '#8A744C');

  // Flèche nord
  const nord=`<line x1="350" y1="38" x2="350" y2="22" stroke="#5A4A2F" stroke-width="2" marker-end="url(#arrow)"/>
<text x="350" y="18" font-family="Fredoka" font-size="12" fill="#5A4A2F" text-anchor="middle">N</text>`;

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stade — secteur circulaire"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A4A2F"/></marker></defs>${pisteExt}${gazon}${outerStroke}${innerStroke}${secteur}${arcHL}${arcAngPath}${angLbl}<circle cx="${cx}" cy="${cy}" r="4" fill="#5A4A2F"/>${labO}${labA}${labB}${rLabel}${nord}${svgNonEchelle(W,H)}</svg>`;
  document.getElementById(cibleId).innerHTML=svg;
}

function genRampe(){
  const configs=[
    {d:4.0,h:0.9,ramp:null},{d:6.0,h:1.2,ramp:null},{d:5.0,h:1.0,ramp:null},{d:8.0,h:1.5,ramp:null}
  ];
  const cfg=choix(configs);
  const d=cfg.d,h=cfg.h;
  const ramp=Math.round(Math.sqrt(d*d+h*h)*100)/100;
  const angle=Math.round(atand(h/d));
  const conforme=(angle<=5);
  const [lA,lB,lC]=lettresDistinctes(3);
  const orient=rnd(2);
  const enonceHTML=`Un accès pour personnes à mobilité réduite est en cours de construction. La rampe doit partir du point <b>${lA}</b> au sol, passer par <b>${lB}</b> (pied du mur, angle droit) et atteindre <b>${lC}</b> en hauteur. La distance horizontale <b>${lA}${lB} = ${fr(d)} m</b> et la hauteur <b>${lB}${lC} = ${fr(h)} m</b>.<br>La norme impose un angle d'inclinaison inférieur à 5°.`;
  const segHyp=seg(lA,lC),segAdj=seg(lA,lB),segOpp=seg(lB,lC);
  const etapes=[
    {
      question:'Question 1 — La longueur de la rampe',
      consigneQ:'Calcule la longueur '+lA+lC+' de la rampe.',
      role:'Justifier',
      q:`Justifie que tu peux utiliser le théorème de Pythagore dans ce triangle.`,
      verif:inp=>norm(inp).includes('rectangle')&&norm(inp).includes(lB.toLowerCase()),
      aide:`Dis que le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`,
      solutionHTML:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`
    },
    {
      role:'Écrire Pythagore',
      clavier:[lA,lB,lC,'²','+','='],
      q:`Écris l'égalité de Pythagore avec les lettres (hypoténuse² = côté² + côté²).`,
      verif:inp=>{const g=norm(inp).split('=');if(g.length<2)return false;const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segAdj,segOpp]);},
      aide:`L'hypoténuse est ${lA}${lC}. Forme : ${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`,
      solutionHTML:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`
    },
    {
      role:'Remplacer les valeurs',
      clavier:['²','+','='],
      q:`Remplace les longueurs connues par leurs valeurs numériques.`,
      verif:inp=>nbsCarres(inp).some(x=>Math.abs(x-d)<0.01)&&nbsCarres(inp).some(x=>Math.abs(x-h)<0.01),
      aide:`Remplace ${lA}${lB} par ${fr(d)} et ${lB}${lC} par ${fr(h)}, avec les carrés.`,
      solutionHTML:`${lA}${lC}² = ${fr(d)}² + ${fr(h)}²`
    },
    {
      role:'Calculer la longueur',
      clavier:['√','='],
      q:`Calcule la longueur ${lA}${lC} (prends la racine carrée).`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-ramp)<=0.05),
      aide:`${fr(d)}² + ${fr(h)}² = ${fr(d*d+h*h)}, donc ${lA}${lC} = √${fr(d*d+h*h)} ≈ ${fr(ramp)} m`,
      solutionHTML:`${lA}${lC} = √(${fr(d*d)}+${fr(h*h)}) ≈ ${fr(ramp)} m`
    },
    {
      question:'Question 2 — L\'angle d\'inclinaison',
      consigneQ:'Calcule l\'angle en '+lA+' puis vérifie la conformité à la norme.',
      role:'Identifier le rapport',
      q:`Par rapport à l'angle en ${lA}, quel rapport trigonométrique utilises-tu ? (cosinus, sinus ou tangente ?)`,
      verif:inp=>norm(inp).includes('tan'),
      aide:`Le côté opposé est ${lB}${lC} et le côté adjacent est ${lA}${lB} : c'est la tangente.`,
      solutionHTML:`tangente : tan(${lA}) = ${lB}${lC} / ${lA}${lB}`
    },
    {
      role:'Écrire la formule',
      type:'fraction',
      q:`Écris : tan(${lA}) = ? avec les noms de côtés.`,
      verif:o=>{const n=norm(o.num),d2=norm(o.den);const sn=seg(n[0]||'',n[1]||''),sd=seg(d2[0]||'',d2[1]||'');return sn===segOpp&&sd===segAdj;},
      aide:`En haut : côté opposé ${lB}${lC}. En bas : côté adjacent ${lA}${lB}.`,
      solutionHTML:`tan(${lA}) = <span class="frac"><span class="num">${lB}${lC}</span><span class="den">${lA}${lB}</span></span>`
    },
    {
      role:'Remplacer par les valeurs',
      type:'fraction',
      q:`Remplace par les valeurs numériques.`,
      verif:o=>{const n=nbs(o.num)[0],d2=nbs(o.den)[0];return Math.abs(n-h)<0.01&&Math.abs(d2-d)<0.01;},
      aide:`En haut : ${fr(h)}. En bas : ${fr(d)}.`,
      solutionHTML:`tan(${lA}) = <span class="frac"><span class="num">${fr(h)}</span><span class="den">${fr(d)}</span></span>`
    },
    {
      role:'Calculer l\'angle',
      clavier:['°'],
      q:`Calcule la mesure de l'angle ${lA} (utilise tan⁻¹ sur la calculatrice), arrondie au degré.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-angle)<=1),
      aide:`tan⁻¹(${fr(h)}÷${fr(d)}) ≈ ${angle}°`,
      solutionHTML:`${lA} = tan⁻¹(${fr(h)}/${fr(d)}) ≈ ${angle}°`
    },
    {
      question:'Question 3 — Conformité à la norme',
      role:'Conclure',
      q:`L'angle est de ${angle}°. La norme impose moins de 5°. Cette rampe est-elle conforme ?`,
      verif:inp=>{const t=norm(inp);const mentionConf=t.includes('conforme');const mentionAngle=nbs(inp).some(x=>Math.abs(x-angle)<=1)||t.includes('5');return mentionConf&&mentionAngle;},
      aide:`Compare ${angle}° à 5°. ${conforme?'Comme '+angle+'° < 5°, la rampe est conforme.':'Comme '+angle+'° > 5°, la rampe n\'est pas conforme.'}`,
      solutionHTML:conforme?`${angle}° &lt; 5° donc la rampe est conforme à la norme.`:`${angle}° &gt; 5° donc la rampe n'est pas conforme à la norme.`
    }
  ];
  return {
    titre:'La rampe d\'accès',
    enonceHTML,
    dessiner:(id)=>dessinerRampe(id,{a:lA,b:lB,c:lC,dLabel:fr(d)+' m',hLabel:fr(h)+' m',rampLabel:'?',orient}),
    etapes
  };
}

function genVoile(){
  const configs=[{b:3,h:4},{b:4,h:3},{b:6,h:8},{b:5,h:12},{b:8,h:6}];
  const cfg=choix(configs);
  const b=cfg.b,h=cfg.h;
  const hampe=Math.round(Math.sqrt(b*b+h*h)*10)/10;
  const prix=choix([18,22,25,30]);
  const aire=b*h/2;
  const cout=aire*prix;
  const [lS,lB,lV]=lettresDistinctes(3);
  const segHyp=seg(lS,lV),segC1=seg(lS,lB),segC2=seg(lB,lV);
  const enonceHTML=`Un voile triangulaire rectangle en <b>${lB}</b> est cousu pour un bateau. Les deux côtés de l'angle droit mesurent <b>${lS}${lB} = ${b} m</b> et <b>${lB}${lV} = ${h} m</b>. La hampe (hypoténuse <b>${lS}${lV}</b>) doit être calculée. Le tissu coûte <b>${prix} €/m²</b>.`;
  const etapes=[
    {
      question:'Question 1 — La longueur de la hampe',
      consigneQ:'Calcule la longueur de la hampe '+lS+lV+'.',
      role:'Justifier',
      q:`Justifie que tu peux utiliser le théorème de Pythagore dans ce triangle.`,
      verif:inp=>norm(inp).includes('rectangle')&&norm(inp).includes(lB.toLowerCase()),
      aide:`Dis que le triangle ${lS}${lB}${lV} est rectangle en ${lB}.`,
      solutionHTML:`Le triangle ${lS}${lB}${lV} est rectangle en ${lB}.`
    },
    {
      role:'Écrire Pythagore',
      clavier:[lS,lB,lV,'²','+','='],
      q:`Écris l'égalité de Pythagore avec les lettres (hypoténuse² = côté² + côté²).`,
      verif:inp=>{const g=norm(inp).split('=');if(g.length<2)return false;const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segC1,segC2]);},
      aide:`L'hypoténuse est ${lS}${lV}. Forme : ${lS}${lV}² = ${lS}${lB}² + ${lB}${lV}²`,
      solutionHTML:`${lS}${lV}² = ${lS}${lB}² + ${lB}${lV}²`
    },
    {
      role:'Remplacer les valeurs',
      clavier:['²','+','='],
      q:`Remplace les longueurs par leurs valeurs numériques.`,
      verif:inp=>nbsCarres(inp).some(x=>Math.abs(x-b)<0.01)&&nbsCarres(inp).some(x=>Math.abs(x-h)<0.01),
      aide:`Remplace ${lS}${lB} par ${b} et ${lB}${lV} par ${h}.`,
      solutionHTML:`${lS}${lV}² = ${b}² + ${h}²`
    },
    {
      role:'Calculer la hampe',
      clavier:['√','='],
      q:`Calcule la longueur ${lS}${lV}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-hampe)<=0.2),
      aide:`${b}² + ${h}² = ${b*b+h*h}, donc ${lS}${lV} = √${b*b+h*h} = ${fr(hampe)} m`,
      solutionHTML:`${lS}${lV} = √(${b*b}+${h*h}) = ${fr(hampe)} m`
    },
    {
      question:"Question 2 — L'aire du voile",
      consigneQ:'Calcule l\'aire du voile triangulaire.',
      role:'Citer la formule',
      q:`Écris la formule de l'aire d'un triangle.`,
      verif:inp=>{const t=norm(inp);return (t.includes('base')&&t.includes('haut'))||(t.includes('2')&&t.includes('/'));},
      aide:`Aire = (base × hauteur) ÷ 2. Les deux côtés de l'angle droit jouent ce rôle.`,
      solutionHTML:`Aire = (base × hauteur) ÷ 2`
    },
    {
      role:'Calculer l\'aire',
      clavier:['×','÷','='],
      q:`Calcule l'aire du voile avec les valeurs ${b} m et ${h} m.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-aire)<=0.05),
      aide:`Aire = (${b} × ${h}) ÷ 2 = ${fr(aire)} m²`,
      solutionHTML:`Aire = (${b} × ${h}) ÷ 2 = ${fr(aire)} m²`
    },
    {
      question:'Question 3 — Le coût du tissu',
      consigneQ:'Calcule le coût total du tissu.',
      role:'Calculer le coût',
      clavier:['×','='],
      q:`Le tissu coûte ${prix} €/m². Calcule le coût total du voile.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-cout)<=0.05),
      aide:`Coût = ${fr(aire)} × ${prix} = ${fr(cout)} €`,
      solutionHTML:`Coût = ${fr(aire)} × ${prix} = ${fr(cout)} €`
    }
  ];
  return {
    titre:'Le voile triangulaire',
    enonceHTML,
    dessiner:(id)=>dessinerVoile(id,{droit:lB,s1:lS,s2:lV,cote1Label:b+' m',cote2Label:h+' m',hypLabel:'?'}),
    etapes
  };
}

function genEchelle(){
  const configs=[{d:1.0,h:2.4,l:2.6},{d:1.5,h:3.6,l:3.9},{d:2.0,h:4.8,l:5.2},{d:1.2,h:1.6,l:2.0}];
  const cfg=choix(configs);
  const d=cfg.d,h=cfg.h,l=cfg.l;
  const angle=Math.round(acosd(d/l));
  const conforme=(angle>=65&&angle<=75);
  const [lA,lB,lC]=lettresDistinctes(3);
  const segHyp=seg(lA,lC),segAdj=seg(lA,lB),segOpp=seg(lB,lC);
  const enonceHTML=`Une échelle est appuyée contre un mur. Le pied de l'échelle est en <b>${lA}</b>, le pied du mur en <b>${lB}</b> (angle droit), le sommet contre le mur en <b>${lC}</b>. La distance au mur <b>${lA}${lB} = ${fr(d)} m</b>. La longueur de l'échelle <b>${lA}${lC} = ${fr(l)} m</b>.<br>Les normes recommandent un angle d'inclinaison entre 65° et 75°.`;
  const etapes=[
    {
      question:'Question 1 — La hauteur atteinte',
      consigneQ:'Calcule la hauteur '+lB+lC+' atteinte par l\'échelle.',
      role:'Justifier',
      q:`Justifie que tu peux utiliser le théorème de Pythagore.`,
      verif:inp=>norm(inp).includes('rectangle')&&norm(inp).includes(lB.toLowerCase()),
      aide:`Dis que le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`,
      solutionHTML:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`
    },
    {
      role:'Écrire Pythagore',
      clavier:[lA,lB,lC,'²','+','='],
      q:`Écris l'égalité de Pythagore (l'hypoténuse est ${lA}${lC}).`,
      verif:inp=>{const g=norm(inp).split('=');if(g.length<2)return false;const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segAdj,segOpp]);},
      aide:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`,
      solutionHTML:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`
    },
    {
      role:'Remplacer les valeurs',
      clavier:['²','+','='],
      q:`Remplace par les valeurs connues pour trouver ${lB}${lC}².`,
      verif:inp=>nbsCarres(inp).some(x=>Math.abs(x-d)<0.01)&&nbsCarres(inp).some(x=>Math.abs(x-l)<0.01),
      aide:`${lA}${lC}² = ${fr(d)}² + ${lB}${lC}² → ${lB}${lC}² = ${fr(l)}² − ${fr(d)}²`,
      solutionHTML:`${fr(l)}² = ${fr(d)}² + ${lB}${lC}² donc ${lB}${lC}² = ${fr(l*l)} − ${fr(d*d)}`
    },
    {
      role:'Calculer la hauteur',
      clavier:['√','='],
      q:`Calcule la longueur ${lB}${lC}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-h)<=0.2),
      aide:`${lB}${lC}² = ${fr(l*l-d*d)}, donc ${lB}${lC} = √${fr(l*l-d*d)} = ${fr(h)} m`,
      solutionHTML:`${lB}${lC} = √(${fr(l*l)}−${fr(d*d)}) = ${fr(h)} m`
    },
    {
      question:"Question 2 — L'angle d'inclinaison",
      consigneQ:'Calcule l\'angle en '+lA+' pour vérifier la conformité aux normes.',
      role:'Identifier le rapport',
      q:`Par rapport à l'angle en ${lA}, tu connais ${lA}${lB} (adjacent) et ${lA}${lC} (hypoténuse). Quel rapport utilises-tu ?`,
      verif:inp=>norm(inp).includes('cos'),
      aide:`Adjacent et hypoténuse : c'est le cosinus.`,
      solutionHTML:`cosinus : cos(${lA}) = ${lA}${lB} / ${lA}${lC}`
    },
    {
      role:'Écrire la formule',
      type:'fraction',
      clavier:[lA,lB,lC],
      q:`Écris : cos(${lA}) = ? avec les noms de côtés.`,
      verif:o=>{const n=norm(o.num),d2=norm(o.den);const sn=seg(n[0]||'',n[1]||''),sd=seg(d2[0]||'',d2[1]||'');return sn===segAdj&&sd===segHyp;},
      aide:`En haut : ${lA}${lB} (adjacent). En bas : ${lA}${lC} (hypoténuse).`,
      solutionHTML:`cos(${lA}) = <span class="frac"><span class="num">${lA}${lB}</span><span class="den">${lA}${lC}</span></span>`
    },
    {
      role:'Remplacer par les valeurs',
      type:'fraction',
      q:`Remplace par les valeurs numériques.`,
      verif:o=>{const n=nbs(o.num)[0],d2=nbs(o.den)[0];return Math.abs(n-d)<0.01&&Math.abs(d2-l)<0.01;},
      aide:`En haut : ${fr(d)}. En bas : ${fr(l)}.`,
      solutionHTML:`cos(${lA}) = <span class="frac"><span class="num">${fr(d)}</span><span class="den">${fr(l)}</span></span>`
    },
    {
      role:"Calculer l'angle",
      clavier:['°'],
      q:`Calcule la mesure de l'angle ${lA} (utilise cos⁻¹), arrondie au degré.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-angle)<=1),
      aide:`cos⁻¹(${fr(d)}÷${fr(l)}) ≈ ${angle}°`,
      solutionHTML:`${lA} = cos⁻¹(${fr(d)}/${fr(l)}) ≈ ${angle}°`
    },
    {
      question:'Question 3 — La conformité',
      role:'Conclure',
      q:`L'angle est de ${angle}°. La norme recommande entre 65° et 75°. Cette pose est-elle conforme ?`,
      verif:inp=>{const t=norm(inp);const mentionConf=t.includes('conforme');const mentionAngle=nbs(inp).some(x=>Math.abs(x-angle)<=1);return mentionConf&&mentionAngle;},
      aide:conforme?`${angle}° est bien entre 65° et 75°, donc l'échelle est placée conformément.`:`${angle}° n'est pas dans l'intervalle [65°;75°], donc la pose n'est pas conforme.`,
      solutionHTML:conforme?`${angle}° est compris entre 65° et 75°, donc la pose est <b>conforme</b> aux normes.`:`${angle}° n'est pas compris entre 65° et 75°, donc la pose n'est <b>pas conforme</b> aux normes.`
    }
  ];
  return {
    titre:"L'échelle contre le mur",
    enonceHTML,
    dessiner:(id)=>dessinerEchelle(id,{droit:lB,s1:lA,s2:lC,cote1Label:fr(d)+' m',cote2Label:'?',hypLabel:fr(l)+' m'}),
    etapes
  };
}

function genTerrain(){
  const triplets=[[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15]];
  const triplet=choix(triplets);
  const k=choix([2,3,4]);
  const ta=triplet[0]*k,tb=triplet[1]*k,tc=triplet[2]*k;
  const [lP,lQ,lR]=lettresDistinctes(3);
  const aire=ta*tb/2;
  const enonceHTML=`Un géomètre mesure un terrain triangulaire. Les trois côtés mesurent <b>${lP}${lQ} = ${ta} m</b>, <b>${lQ}${lR} = ${tb} m</b> et <b>${lP}${lR} = ${tc} m</b>. Est-ce que ce terrain est rectangle ? Si oui, calcule son aire.`;
  const etapes=[
    {
      question:'Question 1 — Ce terrain est-il rectangle ?',
      consigneQ:'Utilise la réciproque du théorème de Pythagore.',
      role:'Identifier le plus grand côté',
      q:`Quel est le plus grand côté ? S'il existe un angle droit, ce côté serait l'hypoténuse.`,
      verif:inp=>nbs(inp).some(x=>x===tc),
      aide:`Le plus grand côté est ${tc} m. S'il y a un angle droit, ${tc} est l'hypoténuse.`,
      solutionHTML:`Le plus grand côté est ${tc} m. Ce serait l'hypoténuse s'il y a un angle droit.`
    },
    {
      role:'Calculer le carré du grand côté',
      clavier:['²','='],
      q:`Calcule ${tc}² = ?`,
      verif:inp=>nbs(inp).some(x=>x===tc*tc),
      aide:`${tc} × ${tc} = ${tc*tc}`,
      solutionHTML:`${tc}² = ${tc*tc}`
    },
    {
      role:'Calculer la somme des carrés',
      clavier:['²','+','='],
      q:`Calcule ${ta}² + ${tb}² = ?`,
      verif:inp=>nbs(inp).some(x=>x===ta*ta+tb*tb),
      aide:`${ta}² + ${tb}² = ${ta*ta} + ${tb*tb} = ${ta*ta+tb*tb}`,
      solutionHTML:`${ta}² + ${tb}² = ${ta*ta} + ${tb*tb} = ${ta*ta+tb*tb}`
    },
    {
      role:'Conclure',
      q:`Compare les deux résultats et conclus sur la nature du terrain.`,
      verif:inp=>{const t=norm(inp);return t.includes('rectangle')&&(t.includes(String(tc*tc))||t.includes('egal'));},
      aide:`${tc}² = ${tc*tc} et ${ta}² + ${tb}² = ${ta*ta+tb*tb}. ${tc*tc===ta*ta+tb*tb?'Ils sont égaux, donc le terrain est rectangle.':''}`,
      solutionHTML:`${tc}² = ${tc*tc} = ${ta}² + ${tb}², donc d'après la réciproque de Pythagore, le terrain est <b>rectangle</b>.`
    },
    {
      question:"Question 2 — L'aire du terrain",
      consigneQ:'Calcule l\'aire du terrain.',
      role:'Citer la formule',
      q:`Écris la formule de l'aire d'un triangle.`,
      verif:inp=>{const t=norm(inp);return (t.includes('base')&&t.includes('haut'))||(t.includes('2')&&t.includes('/'));},
      aide:`Aire = (base × hauteur) ÷ 2`,
      solutionHTML:`Aire = (base × hauteur) ÷ 2`
    },
    {
      role:"Calculer l'aire",
      clavier:['×','÷','='],
      q:`Calcule l'aire du terrain rectangulaire (les deux côtés de l'angle droit sont ${ta} m et ${tb} m).`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-aire)<=0.05),
      aide:`Aire = (${ta} × ${tb}) ÷ 2 = ${fr(aire)} m²`,
      solutionHTML:`Aire = (${ta} × ${tb}) ÷ 2 = ${fr(aire)} m²`
    }
  ];
  return {
    titre:'Le terrain rectangulaire',
    enonceHTML,
    dessiner:(id)=>dessinerTriangleGeneral(id,{s1:lP,s2:lQ,s3:lR,l1:ta+'m',l2:tb+'m',l3:tc+'m'}),
    etapes
  };
}

function genThales(){
  const configs=[{om:4,on:6,ma:5},{om:3,on:9,ma:4},{om:5,on:10,ma:6},{om:4,on:8,ma:7},{om:2,on:6,ma:5}];
  const cfg=choix(configs);
  const om=cfg.om,on=cfg.on,ma=cfg.ma;
  const nb=Math.round(ma*on/om*10)/10;
  const [lO,lM,lN,lA,lB]=lettresDistinctes(5);
  const enonceHTML=`Un géomètre veut mesurer la largeur <b>${lN}${lB}</b> d'un étang. Il choisit un point <b>${lO}</b> depuis lequel les droites (<b>${lO}${lM}${lN}</b>) et (<b>${lO}${lA}${lB}</b>) encadrent l'étang. Il mesure <b>${lO}${lM} = ${om} m</b>, <b>${lO}${lN} = ${on} m</b> et <b>${lM}${lA} = ${ma} m</b>. Les droites (<b>${lM}${lA}</b>) et (<b>${lN}${lB}</b>) sont parallèles.`;
  const etapes=[
    {
      question:"Question 1 — La configuration de Thalès",
      consigneQ:'Justifie que tu peux appliquer le théorème de Thalès.',
      role:'Justifier',
      clavier:[lO,lM,lN,lA,lB],
      q:`Décris la configuration de Thalès : quelles droites sont sécantes en ${lO}, quelles droites sont parallèles ?`,
      verif:inp=>{const t=norm(inp);return (t.includes('parallel')||t.includes('parallele'))&&(t.includes(lM.toLowerCase())||t.includes(lN.toLowerCase()));},
      aide:`Dis que les droites (${lM}${lA}) et (${lN}${lB}) sont parallèles, et que les droites (${lO}${lM}${lN}) et (${lO}${lA}${lB}) sont sécantes en ${lO}.`,
      solutionHTML:`Les droites (${lM}${lA}) et (${lN}${lB}) sont parallèles. Les droites (${lO}${lM}${lN}) et (${lO}${lA}${lB}) sont sécantes en ${lO}. On peut appliquer le théorème de Thalès.`
    },
    {
      question:'Question 2 — La longueur '+lN+lB,
      consigneQ:'Calcule la longueur '+lN+lB+' (largeur de l\'étang).',
      role:'Écrire l\'égalité des rapports',
      clavier:[lO,lM,lN,lA,lB,'/','='],
      q:`Écris l'égalité des rapports donnée par le théorème de Thalès.`,
      verif:inp=>{const t=norm(inp);return t.includes(norm(lO+lM))||t.includes(norm(lM+lA))||t.includes('egal')||t.includes('=');},
      aide:`Le théorème de Thalès donne : ${lO}${lM}/${lO}${lN} = ${lM}${lA}/${lN}${lB}`,
      solutionHTML:`${lO}${lM}/${lO}${lN} = ${lM}${lA}/${lN}${lB}`
    },
    {
      role:'Remplacer par les valeurs',
      clavier:['/','='],
      q:`Remplace par les valeurs numériques : ${lO}${lM} = ${om}, ${lO}${lN} = ${on}, ${lM}${lA} = ${ma}.`,
      verif:inp=>nbs(inp).some(x=>x===om)&&nbs(inp).some(x=>x===on)&&nbs(inp).some(x=>x===ma),
      aide:`${om}/${on} = ${ma}/${lN}${lB}`,
      solutionHTML:`${om}/${on} = ${ma}/${lN}${lB}`
    },
    {
      role:'Calculer la longueur',
      q:`Calcule la longueur ${lN}${lB}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-nb)<=0.1),
      aide:`${lN}${lB} = ${ma} × ${on} ÷ ${om} = ${fr(nb)} m`,
      solutionHTML:`${lN}${lB} = ${ma} × ${on} ÷ ${om} = ${fr(nb)} m`
    }
  ];
  return {
    titre:"La largeur de l'étang",
    enonceHTML,
    dessiner:(id)=>dessinerThales(id,{O:lO,M:lM,N:lN,A:lA,B:lB,om,on,ma,nb}),
    etapes
  };
}

function genFleuve(){
  const configs=[
    {om:3,on:5,ma:4.5},
    {om:4,on:6,ma:6},
    {om:5,on:8,ma:7.5},
    {om:3,on:4.5,ma:4.8}
  ];
  const cfg=choix(configs);
  const nb=Math.round(cfg.ma*cfg.on/cfg.om*10)/10;
  const [lO,lM,lN,lA,lB]=lettresDistinctes(5);
  const enonceHTML=`Pour mesurer la largeur d'une rivière, un arpenteur se place au point <b>${lO}</b> sur la rive proche. Il repère les points <b>${lA}</b> et <b>${lB}</b> sur la rive lointaine, puis place <b>${lM}</b> et <b>${lN}</b> sur la rive proche de façon que <b>${lO}</b>, <b>${lM}</b>, <b>${lA}</b> soient alignés et <b>${lO}</b>, <b>${lN}</b>, <b>${lB}</b> soient alignés. Les deux rives sont parallèles. Il mesure : <b>${lO}${lM} = ${fr(cfg.om)} m</b>, <b>${lO}${lN} = ${fr(cfg.on)} m</b>, <b>${lM}${lA} = ${fr(cfg.ma)} m</b>.<br>Calcule la largeur <b>${lN}${lB}</b> de la rivière.`;
  const etapes=[
    {
      question:'Question 1 — Justification de Thalès',
      consigneQ:'Pourquoi peut-on appliquer le théorème de Thalès ?',
      role:'Justifier',
      q:`Explique pourquoi le théorème de Thalès s'applique ici (droites sécantes, droites parallèles).`,
      verif:inp=>norm(inp).includes('parall')&&(norm(inp).includes('secan')||norm(inp).includes('coup')),
      aide:`Les droites (${lM}${lA}) et (${lN}${lB}) sont parallèles (les deux rives). Les droites (${lO}${lM}${lA}) et (${lO}${lN}${lB}) sont sécantes en ${lO}.`,
      solutionHTML:`Les droites (${lM}${lA}) et (${lN}${lB}) sont parallèles (rives parallèles). Les droites (${lO}${lM}${lA}) et (${lO}${lN}${lB}) sont sécantes en ${lO}. On peut appliquer le théorème de Thalès.`
    },
    {
      question:'Question 2 — La proportion',
      consigneQ:`Écris l'égalité des rapports pour calculer ${lN}${lB}.`,
      role:'Écrire la proportion',
      clavier:[lO,lM,lN,lA,lB,'/',  '='],
      q:`Écris l'égalité des rapports donnée par le théorème de Thalès.`,
      verif:inp=>{const t=norm(inp);return (t.includes(seg(lO,lM))||t.includes(seg(lM,lO)))&&(t.includes(seg(lO,lN))||t.includes(seg(lN,lO)));},
      aide:`Le théorème de Thalès donne : ${lO}${lM}/${lO}${lN} = ${lM}${lA}/${lN}${lB}`,
      solutionHTML:`${lO}${lM}/${lO}${lN} = ${lM}${lA}/${lN}${lB}`
    },
    {
      role:'Remplacer les valeurs',
      clavier:['/',  '='],
      q:`Remplace ${lO}${lM}, ${lO}${lN} et ${lM}${lA} par leurs valeurs numériques.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-cfg.om)<0.01)&&nbs(inp).some(x=>Math.abs(x-cfg.on)<0.01)&&nbs(inp).some(x=>Math.abs(x-cfg.ma)<0.01),
      aide:`${fr(cfg.om)}/${fr(cfg.on)} = ${fr(cfg.ma)}/${lN}${lB}`,
      solutionHTML:`${fr(cfg.om)}/${fr(cfg.on)} = ${fr(cfg.ma)}/${lN}${lB}`
    },
    {
      role:'Calculer la largeur',
      q:`Calcule la largeur ${lN}${lB} de la rivière.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-nb)<=0.15),
      aide:`${lN}${lB} = ${fr(cfg.ma)} × ${fr(cfg.on)} ÷ ${fr(cfg.om)} = ${fr(nb)} m`,
      solutionHTML:`${lN}${lB} = ${fr(cfg.ma)} × ${fr(cfg.on)} ÷ ${fr(cfg.om)} = ${fr(nb)} m`
    }
  ];
  return {
    titre:'La largeur de la rivière',
    enonceHTML,
    dessiner:(id)=>dessinerFleuve(id,{O:lO,M:lM,N:lN,A:lA,B:lB,om:cfg.om,on:cfg.on,ma:cfg.ma}),
    etapes
  };
}

function genSinus(){
  const configs=[
    {l:8,angle:30,h:4},
    {l:10,angle:30,h:5},
    {l:6,angle:30,h:3},
    {l:10,angle:37,h:Math.round(10*sind(37)*10)/10},
    {l:8,angle:45,h:Math.round(8*sind(45)*10)/10},
    {l:12,angle:30,h:6},
    {l:15,angle:20,h:Math.round(15*sind(20)*10)/10}
  ];
  const cfg=choix(configs);
  const l=cfg.l, angle=cfg.angle, h=cfg.h;
  const [lA,lB,lC]=lettresDistinctes(3);
  const enonceHTML=`Un sentier de montagne rectiligne part du point <b>${lA}</b> et monte jusqu'au sommet <b>${lC}</b>. Le point <b>${lB}</b> est au pied de la falaise, directement en dessous du sommet (angle droit en <b>${lB}</b>). La longueur du sentier <b>${lA}${lC} = ${l} m</b>. L'angle d'inclinaison en <b>${lA}</b> est de <b>${angle}°</b>.<br>Calcule le dénivelé <b>${lB}${lC}</b>.`;
  const etapes=[
    {
      question:'Question 1 — Quel rapport trigonométrique ?',
      role:'Identifier',
      q:`Par rapport à l'angle en ${lA}, le côté ${lB}${lC} est opposé et ${lA}${lC} est l'hypoténuse. Quel rapport trigonométrique utilises-tu ?`,
      verif:inp=>norm(inp).includes('sin')&&!norm(inp).includes('cos')&&!norm(inp).includes('tan'),
      aide:`Le côté ${lB}${lC} est opposé à l'angle ${lA}, et ${lA}${lC} est l'hypoténuse → c'est le sinus.`,
      solutionHTML:`sinus : sin(${lA}) = ${lB}${lC} / ${lA}${lC} (côté opposé / hypoténuse)`
    },
    {
      question:`Question 2 — Écrire sin(${lA})`,
      consigneQ:`Exprime sin(${lA}) avec les noms de côtés.`,
      role:'Écrire la formule',
      clavier:[lA,lB,lC,'=','/'],
      q:`Écris : sin(${lA}) = (côté opposé) / (hypoténuse), avec les lettres.`,
      verif:inp=>{const t=norm(inp);return t.includes('sin')&&(t.includes(seg(lB,lC))||t.includes(seg(lC,lB)))&&(t.includes(seg(lA,lC))||t.includes(seg(lC,lA)));},
      aide:`sin(${lA}) = ${lB}${lC} / ${lA}${lC}`,
      solutionHTML:`sin(${lA}) = ${lB}${lC} / ${lA}${lC}`
    },
    {
      question:`Question 3 — Calculer ${lB}${lC}`,
      consigneQ:`Déduis la valeur de ${lB}${lC}.`,
      role:'Calculer le dénivelé',
      q:`En déduire la valeur de ${lB}${lC} = sin(${angle}°) × ${l}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-h)<=0.25),
      aide:`${lB}${lC} = sin(${angle}°) × ${l} ≈ ${fr(h)} m`,
      solutionHTML:`${lB}${lC} = sin(${angle}°) × ${l} = ${fr(h)} m`
    }
  ];
  return {
    titre:'La pente du sentier',
    enonceHTML,
    dessiner:(id)=>dessinerPente(id,{pied:lA,bas:lB,haut:lC,lLabel:l,hLabel:undefined,angleVal:angle}),
    etapes
  };
}

function genVoieAngles(){
  const angles=[40,50,55,60,65,70];
  const angle=choix(angles);
  const sup=180-angle;
  const [lI,lJ]=lettresDistinctes(2);
  const lD1='(d₁)', lD2='(d₂)', lT='(t)';
  const lAlpha='α', lBeta='β';
  const enonceHTML=`Les droites <b>(d₁)</b> et <b>(d₂)</b> sont parallèles. La droite <b>(t)</b> est une sécante qui coupe <b>(d₁)</b> en <b>${lJ}</b> et <b>(d₂)</b> en <b>${lI}</b>. L'angle <b>α = ${angle}°</b>.<br>Détermine la valeur des angles β et γ.`;
  const etapes=[
    {
      question:'Question 1 — Propriété utilisée',
      consigneQ:'Quelle propriété permet de déduire β ?',
      role:'Citer la propriété',
      q:`Quelle propriété géométrique permet de déduire la valeur de β à partir de α ?`,
      verif:inp=>norm(inp).includes('altern'),
      aide:`Les angles α et β sont alternes-internes car (d₁)//(d₂) et (t) est une sécante.`,
      solutionHTML:`Propriété des angles alternes-internes formés par deux parallèles et une sécante.`
    },
    {
      question:'Question 2 — Valeur de β',
      consigneQ:`Déduis la valeur de β. Justifie.`,
      role:'Calculer β',
      clavier:['α','β','=','°'],
      q:`En déduire la valeur de β. Justifie ta réponse.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-angle)<=1)&&(norm(inp).includes('altern')||norm(inp).includes('parall')||norm(inp).includes('eg')),
      aide:`β = α = ${angle}° car ce sont des angles alternes-internes.`,
      solutionHTML:`β = α = ${angle}° (angles alternes-internes, (d₁)//(d₂))`
    },
    {
      question:'Question 3 — Angle supplémentaire γ',
      consigneQ:`Calcule l'angle γ = 180° − α.`,
      role:'Calculer γ',
      clavier:['γ','=','°','180','-'],
      q:`Calcule l'angle γ = 180° − α = 180° − ${angle}°.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-sup)<=1),
      aide:`γ = 180° − ${angle}° = ${sup}°`,
      solutionHTML:`γ = 180° − ${angle}° = ${sup}°`
    }
  ];
  return {
    titre:'Les angles et les parallèles',
    enonceHTML,
    dessiner:(id)=>dessinerAnglesParalleles(id,{angle,nomD1:lD1,nomD2:lD2,nomT:lT,nomI:lI,nomJ:lJ,nomAlpha:lAlpha,nomBeta:lBeta}),
    etapes
  };
}

function genStade(){

    {r_reel:60,angle:120},
    {r_reel:50,angle:60},
    {r_reel:70,angle:90},
    {r_reel:60,angle:180}
  ];
  const cfg=choix(configs);
  const r=cfg.r_reel, ang=cfg.angle;
  const arc=Math.round(ang/360*2*Math.PI*r*10)/10;
  const aire=Math.round(ang/360*Math.PI*r*r*10)/10;
  const [lO,lA,lB]=lettresDistinctes(3);
  const enonceHTML=`Un stade d'athlétisme possède une piste circulaire de rayon <b>${r} m</b>. Un secteur angulaire <b>${lO}${lA}${lB}</b> d'angle <b>${ang}°</b> est délimité, avec <b>${lO}</b> le centre du cercle.<br>Calcule la longueur de l'arc <b>${lA}${lB}</b> puis l'aire du secteur.`;
  const etapes=[
    {
      question:`Question 1 — Formule de l'arc ${lA}${lB}`,
      consigneQ:'Écris la formule de la longueur d\'un arc de cercle.',
      role:'Écrire la formule',
      q:`Écris la formule permettant de calculer la longueur de l'arc ${lA}${lB} (utilise l'angle et le périmètre du cercle complet).`,
      verif:inp=>{const t=norm(inp);return (t.includes('360')||t.includes('2')&&t.includes('pi')||t.includes('2π')||t.includes('peri')||t.includes('arc'))||nbs(inp).some(x=>Math.abs(x-arc)<=1.5);},
      aide:`L'arc vaut la fraction (${ang}/360) du périmètre total : arc = (${ang}/360) × 2 × π × ${r}`,
      solutionHTML:`Arc ${lA}${lB} = (${ang}/360) × 2 × π × ${r} ≈ ${fr(arc)} m`
    },
    {
      question:`Question 2 — Calcul numérique de l'arc`,
      consigneQ:`Calcule numériquement la longueur de l'arc ${lA}${lB}.`,
      role:'Calculer l\'arc',
      q:`Calcule : arc ${lA}${lB} = (${ang}/360) × 2 × π × ${r}. Arrondis au dixième.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-arc)<=1.5),
      aide:`(${ang}/360) × 2 × π × ${r} ≈ ${fr(arc)} m`,
      solutionHTML:`Arc ${lA}${lB} = (${ang}/360) × 2π × ${r} ≈ ${fr(arc)} m`
    },
    {
      question:`Question 3 — Aire du secteur ${lO}${lA}${lB}`,
      consigneQ:`Calcule l'aire du secteur ${lO}${lA}${lB}.`,
      role:"Calculer l'aire",
      q:`Calcule l'aire du secteur ${lO}${lA}${lB} = (${ang}/360) × π × ${r}². Arrondis au dixième.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-aire)<=2),
      aide:`Aire = (${ang}/360) × π × ${r}² ≈ ${fr(aire)} m²`,
      solutionHTML:`Aire = (${ang}/360) × π × ${r}² ≈ ${fr(aire)} m²`
    }
  ];
  return {
    titre:'Le secteur du stade',
    enonceHTML,
    dessiner:(id)=>dessinerStade(id,{r_reel:r,angle:ang,lO,lA,lB}),
    etapes
  };
}

/* ===== SITUATION : Pythagore triangle rectangle ===== */
function genPythagore(){
  const configs=[
    {a:6,b:8,hyp:10},{a:5,b:12,hyp:13},{a:9,b:12,hyp:15},{a:8,b:15,hyp:17},
    {a:3,b:4,hyp:5},{a:7,b:24,hyp:25}
  ];
  const cfg=choix(configs);
  const [lA,lB,lC]=lettresDistinctes(3);
  // cas 1 : hypotenuse manquante, cas 2 : un cote manquant
  const casManquant=rnd(2);
  let enonceHTML,etapes,dessinerFn;
  if(casManquant===0){
    // calculer l'hypotenuse
    enonceHTML=`Le triangle <b>${lA}${lB}${lC}</b> est rectangle en <b>${lB}</b>. On sait que <b>${lA}${lB} = ${cfg.a} cm</b> et <b>${lB}${lC} = ${cfg.b} cm</b>. Calcule la longueur de l'hypotenuse <b>${lA}${lC}</b>.`;
    const segHyp=seg(lA,lC),segC1=seg(lA,lB),segC2=seg(lB,lC);
    etapes=[
      {question:'Question 1 — Justification',role:'Justifier Pythagore',
       q:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}. Quelle egalite de Pythagore peut-on ecrire ?`,
       verif:inp=>norm(inp).includes('rectangle')&&norm(inp).includes(lB.toLowerCase()),
       aide:`Dis que le triangle est rectangle en ${lB}.`,
       solutionHTML:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`},
      {role:"Ecrire Pythagore",clavier:[lA,lB,lC,'²','+','='],
       q:`Ecris : hypotenuse² = cote² + cote².`,
       verif:inp=>{const g=norm(inp).split('=');if(g.length<2)return false;const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segC1,segC2]);},
       aide:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`,
       solutionHTML:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`},
      {role:'Remplacer les valeurs',clavier:['²','+','='],
       q:`Remplace ${lA}${lB} par ${cfg.a} et ${lB}${lC} par ${cfg.b}.`,
       verif:inp=>nbsCarres(inp).some(x=>Math.abs(x-cfg.a)<0.01)&&nbsCarres(inp).some(x=>Math.abs(x-cfg.b)<0.01),
       aide:`${lA}${lC}² = ${cfg.a}² + ${cfg.b}² = ${cfg.a*cfg.a} + ${cfg.b*cfg.b} = ${cfg.a*cfg.a+cfg.b*cfg.b}`,
       solutionHTML:`${lA}${lC}² = ${cfg.a}² + ${cfg.b}² = ${cfg.a*cfg.a+cfg.b*cfg.b}`},
      {role:"Calculer l'hypotenuse",clavier:['√','='],
       q:`Prends la racine carree pour obtenir ${lA}${lC}.`,
       verif:inp=>nbs(inp).some(x=>Math.abs(x-cfg.hyp)<=0.05),
       aide:`${lA}${lC} = √${cfg.a*cfg.a+cfg.b*cfg.b} = ${cfg.hyp} cm`,
       solutionHTML:`${lA}${lC} = √${cfg.a*cfg.a+cfg.b*cfg.b} = ${cfg.hyp} cm`}
    ];
    dessinerFn=(id)=>dessinerTriangleRectangle(id,{droit:lB,s1:lA,s2:lC,cote1Label:`${cfg.a} cm`,cote2Label:`${cfg.b} cm`,hypLabel:'?'});
  } else {
    // calculer un cote a partir de l'hypotenuse
    enonceHTML=`Le triangle <b>${lA}${lB}${lC}</b> est rectangle en <b>${lB}</b>. On sait que <b>${lA}${lC} = ${cfg.hyp} cm</b> (hypotenuse) et <b>${lA}${lB} = ${cfg.a} cm</b>. Calcule la longueur du cote <b>${lB}${lC}</b>.`;
    const segHyp=seg(lA,lC),segC1=seg(lA,lB),segC2=seg(lB,lC);
    etapes=[
      {question:'Question 1 — Justification',role:'Justifier Pythagore',
       q:`Justifie l'utilisation du theoreme de Pythagore.`,
       verif:inp=>norm(inp).includes('rectangle')&&norm(inp).includes(lB.toLowerCase()),
       aide:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`,
       solutionHTML:`Le triangle ${lA}${lB}${lC} est rectangle en ${lB}.`},
      {role:'Ecrire Pythagore',clavier:[lA,lB,lC,'²','+','='],
       q:`Ecris l'egalite de Pythagore avec ${lA}${lC} comme hypotenuse.`,
       verif:inp=>{const g=norm(inp).split('=');if(g.length<2)return false;const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segC1,segC2]);},
       aide:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`,
       solutionHTML:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`},
      {role:'Isoler le cote inconnu',clavier:['²','-','='],
       q:`Deduis ${lB}${lC}² = ${lA}${lC}² - ${lA}${lB}². Calcule numeriquement.`,
       verif:inp=>nbs(inp).some(x=>Math.abs(x-cfg.b*cfg.b)<=0.1),
       aide:`${lB}${lC}² = ${cfg.hyp}² - ${cfg.a}² = ${cfg.hyp*cfg.hyp} - ${cfg.a*cfg.a} = ${cfg.b*cfg.b}`,
       solutionHTML:`${lB}${lC}² = ${cfg.hyp}² - ${cfg.a}² = ${cfg.b*cfg.b}`},
      {role:'Calculer le cote',clavier:['√','='],
       q:`Calcule ${lB}${lC} = √${cfg.b*cfg.b}.`,
       verif:inp=>nbs(inp).some(x=>Math.abs(x-cfg.b)<=0.05),
       aide:`${lB}${lC} = √${cfg.b*cfg.b} = ${cfg.b} cm`,
       solutionHTML:`${lB}${lC} = ${cfg.b} cm`}
    ];
    dessinerFn=(id)=>dessinerTriangleRectangle(id,{droit:lB,s1:lA,s2:lC,cote1Label:`${cfg.a} cm`,cote2Label:'?',hypLabel:`${cfg.hyp} cm`});
  }
  return {titre:'Theoreme de Pythagore',enonceHTML,dessiner:dessinerFn,etapes};
}

/* ===== SITUATION : Thales — longueur inconnue avec figure ===== */
function genThalesOmbre(){
  const configs=[
    {hObj:1.8,lOmbre:2.4,hPal:5,contexte:'arbre',unitObj:'un poteau',unitOmbre:'l\'ombre du poteau',unitCible:'la hauteur de l\'arbre',lOmbreCible:6.0},
    {hObj:1.6,lOmbre:2.0,hPal:4,contexte:'lampadaire',unitObj:'une personne',unitOmbre:'l\'ombre de la personne',unitCible:'la hauteur du lampadaire',lOmbreCible:5.0},
    {hObj:2.0,lOmbre:3.0,hPal:6,contexte:'pylone',unitObj:'un poteau de 2 m',unitOmbre:'l\'ombre du poteau',unitCible:'la hauteur du pylone',lOmbreCible:9.0}
  ];
  const cfg=choix(configs);
  const hObj=cfg.hObj,lOmbre=cfg.lOmbre,hPal=cfg.hPal,lOmbreCible=cfg.lOmbreCible;

  // verifier : hPal/hObj = lOmbreCible/lOmbre

  const enonceHTML=`Un beau jour ensoleille, ${cfg.unitObj} de <b>${hObj} m</b> projette une ombre de <b>${lOmbre} m</b>. Au meme moment, un ${cfg.contexte} projette une ombre de <b>${lOmbreCible} m</b>. Calcule la hauteur du ${cfg.contexte}.<br>Les rayons du soleil sont paralleles.`;
  const etapes=[
    {question:'Question 1 — Justification de Thales',
     consigneQ:'Pourquoi peut-on appliquer le theoreme de Thales ?',

     q:`Explique la configuration : quelles droites sont paralleles, quelles droites sont secantes ?`,
     verif:inp=>(norm(inp).includes('parall')||norm(inp).includes('soleil'))&&(norm(inp).includes('secan')||norm(inp).includes('rayon')||norm(inp).includes('coup')),
     aide:`Les rayons du soleil sont paralleles. Ils coupent deux droites secantes (le poteau et le ${cfg.contexte}).`,
     solutionHTML:`Les rayons du soleil (paralleles) coupent les deux secantes. On peut appliquer le theoreme de Thales.`},
    {question:'Question 2 — Egalite des rapports',
     role:'Ecrire la proportion',
     clavier:['/','='],
     q:`Ecris l'egalite : hauteur poteau / ombre poteau = hauteur ${cfg.contexte} / ombre ${cfg.contexte}.`,
     verif:inp=>{const ns=nbs(inp);return ns.some(x=>Math.abs(x-hObj)<0.01)&&ns.some(x=>Math.abs(x-lOmbre)<0.01);},
     aide:`${hObj}/${lOmbre} = x/${lOmbreCible}`,
     solutionHTML:`${hObj}/${lOmbre} = x/${lOmbreCible}`},
    {role:'Calculer la hauteur',
     q:`Deduis la hauteur du ${cfg.contexte} : x = ${hObj} x ${lOmbreCible} / ${lOmbre}.`,
     verif:inp=>nbs(inp).some(x=>Math.abs(x-hPalCalc)<=0.1),
     aide:`x = ${hObj} x ${lOmbreCible} / ${lOmbre} = ${hPalCalc} m`,
     solutionHTML:`Hauteur du ${cfg.contexte} = ${hObj} × ${lOmbreCible} ÷ ${lOmbre} = ${hPalCalc} m`}
  ];
  return {
    titre:'Thales et les ombres',
    enonceHTML,
    dessiner:(id)=>dessinerThales(id,{O:lO,M:lM,N:lN,A:lA,B:lB,om:hObj,on:hPalCalc,ma:lOmbre,nb:lOmbreCible}),

  };
}

/* ===== SITUATION : Trigonometrie — angle ou cote ===== */
function genTrigono(){
  const angles=[25,30,35,40,45,50,55,60];
  const angle=choix(angles);
  const contextes=[
    {nom:'Rampe de skatepark',typeCote:'hypotenuse',longueur:choix([8,10,12,15]),rapport:'sin'},
    {nom:'Pente d\'un toit',typeCote:'hypotenuse',longueur:choix([6,8,10]),rapport:'sin'},
    {nom:'Chemin en montagne',typeCote:'hypotenuse',longueur:choix([100,120,150]),rapport:'sin'},
    {nom:'Corde d\'escalade',typeCote:'adjacent',longueur:choix([5,8,10]),rapport:'cos'}
  ];
  const ctx=choix(contextes);
  const [lA,lB,lC]=lettresDistinctes(3);
  let coteInc,formuleTrig,enonceHTML,etapes,dessinerFn;
  if(ctx.rapport==='sin'){
    // hyp donne, trouver le cote oppose
    const hyp=ctx.longueur;
    coteInc=Math.round(sind(angle)*hyp*100)/100;
    enonceHTML=`${ctx.nom} : le triangle ${lA}${lB}${lC} est rectangle en ${lB}. L'angle en ${lA} vaut <b>${angle}°</b> et l'hypotenuse <b>${lA}${lC} = ${hyp} m</b>. Calcule le cote oppose <b>${lB}${lC}</b>.`;
    const segOpp=seg(lB,lC),segHyp=seg(lA,lC);
    etapes=[
      {question:'Question 1 — Identifier le rapport',role:'Choisir sin, cos ou tan',
       q:`Par rapport a l'angle en ${lA}, ${lB}${lC} est oppose et ${lA}${lC} est l'hypotenuse. Quel rapport trigonometrique utilises-tu ?`,
       verif:inp=>norm(inp).includes('sin')&&!norm(inp).includes('cos')&&!norm(inp).includes('tan'),
       aide:`Cote oppose / hypotenuse => c'est le SINUS.`,
       solutionHTML:`sinus : sin(${lA}) = ${lB}${lC} / ${lA}${lC}`},
      {question:'Question 2 — Ecrire la formule',role:'Formule avec lettres',
       clavier:[lA,lB,lC,'/','='],
       q:`Ecris sin(${lA}) = ${lB}${lC} / ${lA}${lC}.`,
       verif:inp=>{const t=norm(inp);return t.includes('sin')&&(t.includes(segOpp)||t.includes(seg(lC,lB)))&&(t.includes(segHyp)||t.includes(seg(lC,lA)));},
       aide:`sin(${lA}) = ${lB}${lC} / ${lA}${lC}`,
       solutionHTML:`sin(${lA}) = ${lB}${lC} / ${lA}${lC}`},
      {question:'Question 3 — Calculer le cote',role:'Calculer '+lB+lC,
       q:`Deduis ${lB}${lC} = sin(${angle}°) × ${hyp}.`,
       verif:inp=>nbs(inp).some(x=>Math.abs(x-coteInc)<=0.1),
       aide:`${lB}${lC} = sin(${angle}°) × ${hyp} ≈ ${fr(coteInc)} m`,
       solutionHTML:`${lB}${lC} = sin(${angle}°) × ${hyp} ≈ ${fr(coteInc)} m`}
    ];
    dessinerFn=(id)=>dessinerPente(id,{pied:lA,bas:lB,haut:lC,lLabel:hyp,hLabel:undefined,angleVal:angle});
  } else {
    // hyp et angle donnes, trouver adjacent
    const hyp=ctx.longueur;
    coteInc=Math.round(cosd(angle)*hyp*100)/100;
    enonceHTML=`${ctx.nom} : le triangle ${lA}${lB}${lC} est rectangle en ${lB}. L'angle en ${lA} vaut <b>${angle}°</b> et l'hypotenuse <b>${lA}${lC} = ${hyp} m</b>. Calcule le cote adjacent <b>${lA}${lB}</b>.`;
    const segAdj=seg(lA,lB),segHyp=seg(lA,lC);
    etapes=[
      {question:'Question 1 — Identifier le rapport',role:'Choisir sin, cos ou tan',
       q:`Par rapport a l'angle en ${lA}, ${lA}${lB} est adjacent et ${lA}${lC} est l'hypotenuse. Quel rapport trigonometrique utilises-tu ?`,
       verif:inp=>norm(inp).includes('cos')&&!norm(inp).includes('sin')&&!norm(inp).includes('tan'),
       aide:`Cote adjacent / hypotenuse => c'est le COSINUS.`,
       solutionHTML:`cosinus : cos(${lA}) = ${lA}${lB} / ${lA}${lC}`},
      {question:'Question 2 — Ecrire la formule',role:'Formule avec lettres',
       clavier:[lA,lB,lC,'/','='],
       q:`Ecris cos(${lA}) = ${lA}${lB} / ${lA}${lC}.`,
       verif:inp=>{const t=norm(inp);return t.includes('cos')&&(t.includes(segAdj)||t.includes(seg(lB,lA)))&&(t.includes(segHyp)||t.includes(seg(lC,lA)));},
       aide:`cos(${lA}) = ${lA}${lB} / ${lA}${lC}`,
       solutionHTML:`cos(${lA}) = ${lA}${lB} / ${lA}${lC}`},
      {question:'Question 3 — Calculer le cote',role:'Calculer '+lA+lB,
       q:`Deduis ${lA}${lB} = cos(${angle}°) × ${hyp}.`,
       verif:inp=>nbs(inp).some(x=>Math.abs(x-coteInc)<=0.1),
       aide:`${lA}${lB} = cos(${angle}°) × ${hyp} ≈ ${fr(coteInc)} m`,
       solutionHTML:`${lA}${lB} = cos(${angle}°) × ${hyp} ≈ ${fr(coteInc)} m`}
    ];
    dessinerFn=(id)=>dessinerRampe(id,{a:lA,b:lB,c:lC,dLabel:'?',hLabel:undefined,rampLabel:`${hyp} m`,orient:0});
  }
  return {titre:'Trigonometrie dans le triangle rectangle',enonceHTML,dessiner:dessinerFn,etapes};
}

/* ===== SITUATION : Symetries et transformations ===== */
function genTransfo(){
  // Triangle avec coordonnees aleatoires, symetrie par rapport a un axe
  const x1=1+rnd(4),y1=1+rnd(4);
  const x2=x1+1+rnd(3),y2=1+rnd(4);
  const x3=x1+rnd(3),y3=y1+1+rnd(3);
  const axes=[
    {nom:'l\'axe des abscisses (axe x)',fn:(x,y)=>({x,y:-y}),label:"axe des abscisses"},
    {nom:'l\'axe des ordonnees (axe y)',fn:(x,y)=>({x:-x,y}),label:"axe des ordonnees"}
  ];
  const axe=choix(axes);
  const A={x:x1,y:y1},B={x:x2,y:y2},C={x:x3,y:y3};
  const Ap=axe.fn(x1,y1),Bp=axe.fn(x2,y2),Cp=axe.fn(x3,y3);
  const [lA,lB,lC]=lettresDistinctes(3);
  const enonceHTML=`Le triangle <b>${lA}${lB}${lC}</b> a pour sommets :<br>`
    +`&bull; ${lA}(${A.x} ; ${A.y})<br>&bull; ${lB}(${B.x} ; ${B.y})<br>&bull; ${lC}(${C.x} ; ${C.y})<br><br>`
    +`Construis le symetrique de ce triangle par rapport a <b>${axe.nom}</b>.<br>`
    +`1. Donne les coordonnees de ${lA}', ${lB}' et ${lC}'.<br>`
    +`2. Quelle est la nature du quadrilatere forme par ${lA}, ${lB}, ${lB}', ${lA}' ?`;
  const quadNature=(A.y===B.y)?'rectangle':'parallelogramme';

  function dessiner(cibleId){
    const W=340,H=300,ox=50,oy=150,sc=28;
    function px(x){return ox+x*sc;}
    function py(y){return oy-y*sc;}
    let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    svg+=`<rect width="${W}" height="${H}" fill="#FFF6E6" rx="10"/>`;
    // Grille
    for(let x=-1;x<=7;x++){svg+=`<line x1="${px(x)}" y1="10" x2="${px(x)}" y2="${H-10}" stroke="#E0D0B0" stroke-width="1"/>`;svg+=`<text x="${px(x)}" y="${py(0)+18}" font-family="Fredoka" font-size="12" fill="#A08B6E" text-anchor="middle">${x}</text>`;}
    for(let y=-4;y<=5;y++){svg+=`<line x1="${ox-10}" y1="${py(y)}" x2="${W-10}" y2="${py(y)}" stroke="#E0D0B0" stroke-width="1"/>`;if(y!==0)svg+=`<text x="${ox-6}" y="${py(y)}" font-family="Fredoka" font-size="12" fill="#A08B6E" text-anchor="end" dominant-baseline="middle">${y}</text>`;}
    // Axes
    svg+=`<line x1="${ox-10}" y1="${py(0)}" x2="${W-10}" y2="${py(0)}" stroke="#5A4A2F" stroke-width="2.5"/>`;
    svg+=`<line x1="${px(0)}" y1="10" x2="${px(0)}" y2="${H-10}" stroke="#5A4A2F" stroke-width="2.5"/>`;
    // Triangle original (orange)
    svg+=`<polygon points="${px(A.x)},${py(A.y)} ${px(B.x)},${py(B.y)} ${px(C.x)},${py(C.y)}" fill="#FFE7B0" fill-opacity="0.7" stroke="#E07A1F" stroke-width="2.5"/>`;
    svg+=svgTxt(px(A.x)-14,py(A.y)-8,lA,14,'#E07A1F')+svgTxt(px(B.x)+12,py(B.y)-8,lB,14,'#E07A1F')+svgTxt(px(C.x)+12,py(C.y)+14,lC,14,'#E07A1F');
    // Triangle symetrique (bleu pointille)
    svg+=`<polygon points="${px(Ap.x)},${py(Ap.y)} ${px(Bp.x)},${py(Bp.y)} ${px(Cp.x)},${py(Cp.y)}" fill="#C8E8F5" fill-opacity="0.5" stroke="#4FA3D1" stroke-width="2" stroke-dasharray="5,3"/>`;

     aide:`Par rapport a ${axe.label} : x reste, y change de signe (ou inversement). ${lA}'(${Ap.x} ; ${Ap.y})`,
     solutionHTML:`${lA}'(${Ap.x} ; ${Ap.y})`},
    {question:`Question 2 — Coordonnees de ${lB}' et ${lC}'`,role:'Appliquer la meme transformation',
     q:`Donne les coordonnees de ${lB}'(${B.x} ; ${B.y}) et ${lC}'(${C.x} ; ${C.y}).`,
     verif:inp=>{const ns=nbs(inp);return ns.some(x=>Math.abs(x-Math.abs(Bp.x))<=0.05)||ns.some(x=>Math.abs(x-Math.abs(Cp.y))<=0.05);},
     aide:`${lB}'(${Bp.x} ; ${Bp.y}) et ${lC}'(${Cp.x} ; ${Cp.y})`,
     solutionHTML:`${lB}'(${Bp.x} ; ${Bp.y}) ; ${lC}'(${Cp.x} ; ${Cp.y})`},
    {question:`Question 3 — Nature du quadrilatere`,role:'Identifier la figure',
     q:`Que remarques-tu sur le quadrilatere ${lA}${lB}${lB}'${lA}' ? Quelle est sa nature ?`,
     verif:inp=>{const t=norm(inp);return t.includes('rectangle')||t.includes('parallelogramme')||t.includes('symet');},

     solutionHTML:`Le quadrilatere ${lA}${lB}${lB}'${lA}' est un rectangle (cotes paralleles et perpendiculaires a l'axe).`}
