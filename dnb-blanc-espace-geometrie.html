  return {titre:'Symetrie axiale et coordonnees',enonceHTML,dessiner,etapes};
}

/* ===== SITUATION : Pave droit — volume et aire ===== */
function genSolide(){
  const L=2+rnd(8),l=2+rnd(6),h=2+rnd(5);
  const volume=L*l*h;
  const aire=2*(L*l+L*h+l*h);
  const diag=Math.round(Math.sqrt(L*L+l*l+h*h)*100)/100;
  const contextes=[
    {sujet:'une boite de rangement',mat:'carton',unite:'cm'},
    {sujet:'un aquarium',mat:'verre',unite:'cm'},
    {sujet:'une caisse en bois',mat:'bois',unite:'cm'}
  ];
  const ctx=choix(contextes);
  const enonceHTML=`On fabrique ${ctx.sujet} en forme de pave droit (rectangle). Ses dimensions sont :`
    +`<br>&bull; Longueur : <b>${L} ${ctx.unite}</b><br>&bull; Largeur : <b>${l} ${ctx.unite}</b><br>&bull; Hauteur : <b>${h} ${ctx.unite}</b><br><br>`
    +`1. Calcule le volume du pave droit.<br>`
    +`2. Calcule l'aire totale (somme des 6 faces).<br>`
    +`3. On veut peindre la surface exterieure avec un pot de peinture couvrant <b>500 ${ctx.unite}²</b>. Est-ce suffisant ?`;

  function dessiner(cibleId){
    const W=360,H=260;
    // Dessin axonometrique du pave droit
    const ox=60,oy=180,dx=L*16,dy=l*10,dz=h*14;
    const off=0.6;
    const ax=ox+off*l*8,ay=oy-off*l*6;
    let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    svg+=`<rect width="${W}" height="${H}" fill="#FFF6E6" rx="10"/>`;
    // Face de face (bas)
    svg+=`<polygon points="${ox},${oy} ${ox+dx},${oy} ${ox+dx},${oy-dz} ${ox},${oy-dz}" fill="#FFE7B0" stroke="#E0A415" stroke-width="2"/>`;
    // Face de cote (droite)
    svg+=`<polygon points="${ox+dx},${oy} ${ox+dx+ax-ox},${oy-(ay-oy)} ${ox+dx+ax-ox},${oy-dz-(ay-oy)} ${ox+dx},${oy-dz}" fill="#FFD98A" stroke="#E0A415" stroke-width="2"/>`;
    // Face du haut
    svg+=`<polygon points="${ox},${oy-dz} ${ox+dx},${oy-dz} ${ox+dx+ax-ox},${oy-dz-(ay-oy)} ${ax},${ay-dz}" fill="#FFC93C" fill-opacity="0.7" stroke="#E0A415" stroke-width="2"/>`;
    // Cotes en pointilles (arriere)
    svg+=`<line x1="${ox}" y1="${oy}" x2="${ax}" y2="${ay}" stroke="#C9A24A" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg+=`<line x1="${ax}" y1="${ay}" x2="${ox+dx+ax-ox}" y2="${ay}" stroke="#C9A24A" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg+=`<line x1="${ax}" y1="${ay}" x2="${ax}" y2="${ay-dz}" stroke="#C9A24A" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    // Etiquettes dimensions
    svg+=svgTxt(ox+dx/2,oy+16,L+' '+ctx.unite,14,'#E07A1F');
    svg+=svgTxt(ox-20,oy-dz/2,h+' '+ctx.unite,14,'#E07A1F');
    svg+=svgTxt(ox+dx+(ax-ox)/2+20,oy-(ay-oy)/2+6,l+' '+ctx.unite,13,'#E07A1F');
    svg+=svgNonEchelle(W,H);
    svg+='</svg>';
    document.getElementById(cibleId).innerHTML=svg;
  }

  const etapes=[
    {question:'Question 1 — Volume du pave droit',role:'Appliquer la formule',
     q:`Ecris la formule du volume d'un pave droit : V = longueur × largeur × hauteur. Calcule numeriquement.`,
     verif:inp=>{const t=norm(inp);return nbs(inp).some(x=>Math.abs(x-volume)<=0.1)||(t.includes('l')&&t.includes('h')&&t.includes('='));},
     aide:`V = ${L} × ${l} × ${h} = ${volume} ${ctx.unite}³`,
     solutionHTML:`V = ${L} × ${l} × ${h} = ${volume} ${ctx.unite}³`},
    {question:"Question 2 — Aire totale (6 faces)",role:'Calculer l\'aire',
     q:`Le pave a 3 paires de faces rectangulaires. Calcule l'aire totale : 2×(L×l + L×h + l×h).`,
     verif:inp=>nbs(inp).some(x=>Math.abs(x-aire)<=0.5),
     aide:`Aire = 2×(${L}×${l} + ${L}×${h} + ${l}×${h}) = 2×(${L*l}+${L*h}+${l*h}) = 2×${L*l+L*h+l*h} = ${aire} ${ctx.unite}²`,
     solutionHTML:`Aire = 2×(${L*l}+${L*h}+${l*h}) = ${aire} ${ctx.unite}²`},
    {question:'Question 3 — Suffisance du pot de peinture',role:'Comparer a 500 cm²',
     q:`L'aire totale est de ${aire} cm². Un pot couvre 500 cm². Est-ce suffisant pour peindre la boite ?`,
     verif:inp=>{const t=norm(inp);const hasSuffisant=t.includes('oui')||t.includes('suffi')||t.includes('non')||t.includes('insuffi');const hasVal=nbs(inp).some(x=>Math.abs(x-aire)<=1);return hasSuffisant&&hasVal;},
     aide:`Aire = ${aire} cm². Comparer avec 500 cm². ${aire<=500?'500 ≥ '+aire+', donc c\'est suffisant.':'500 < '+aire+', donc c\'est insuffisant.'}`,
     solutionHTML:aire<=500?`${aire} cm² ≤ 500 cm² : un pot suffit.`:`${aire} cm² > 500 cm² : un pot ne suffit pas (il en faut ${Math.ceil(aire/500)}).`}
  ];
  return {titre:'Pave droit — volume et aire',enonceHTML,dessiner,etapes};
}

/* ===== SITUATION : Pythagore — trouver un côté quelconque ===== */
function genPythagoreCoté(){
  // On donne hypoténuse et un côté → trouver l'autre côté
  const configs=[
    {hyp:13,c1:5,c2:12},
    {hyp:17,c1:8,c2:15},
    {hyp:25,c1:7,c2:24},
    {hyp:10,c1:6,c2:8}
  ];
  const cfg=choix(configs);
  const hyp=cfg.hyp, c1=cfg.c1, c2=cfg.c2;
  const [lA,lB,lC]=lettresDistinctes(3);
  const segHyp=seg(lA,lC), segC1=seg(lA,lB), segC2=seg(lB,lC);
  const enonceHTML=`Le triangle <b>${lA}${lB}${lC}</b> est rectangle en <b>${lB}</b>. On sait que <b>${lA}${lC} = ${hyp} cm</b> et <b>${lA}${lB} = ${c1} cm</b>.<br>Calcule la longueur ${lB}${lC}.`;
  const etapes=[
    {
      question:`Question 1 — Écrire le théorème de Pythagore`,
      role:'Identifier hypoténuse et côtés',
      q:`Le triangle est rectangle en ${lB}. Écris l'égalité de Pythagore (hypoténuse² = côté² + côté²).`,
      verif:inp=>{
        const g=norm(inp).split('=');
        if(g.length<2)return false;
        const G=segsCarres(g[0]),D=segsCarres(g.slice(1).join('='));
        return G.length===1&&G[0]===segHyp&&D.length===2&&memeEnsemble(D,[segC1,segC2]);
      },
      aide:`L'hypoténuse est ${lA}${lC}. Forme : ${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`,
      solutionHTML:`${lA}${lC}² = ${lA}${lB}² + ${lB}${lC}²`
    },
    {
      role:'Isoler le côté inconnu',
      clavier:['²','-','='],
      q:`Isole ${lB}${lC}² : ${lB}${lC}² = ${lA}${lC}² − ${lA}${lB}² = ${hyp}² − ${c1}².`,
      verif:inp=>{
        const ns=nbs(inp);
        return ns.some(x=>Math.abs(x-hyp*hyp)<0.5)&&ns.some(x=>Math.abs(x-c1*c1)<0.5);
      },
      aide:`${lB}${lC}² = ${hyp}² − ${c1}² = ${hyp*hyp} − ${c1*c1} = ${hyp*hyp-c1*c1}`,
      solutionHTML:`${lB}${lC}² = ${hyp*hyp} − ${c1*c1} = ${hyp*hyp-c1*c1}`
    },
    {
      role:'Calculer la longueur',
      clavier:['√','='],
      q:`Calcule ${lB}${lC} = √${hyp*hyp-c1*c1}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-c2)<=0.05),
      aide:`√${hyp*hyp-c1*c1} = ${c2} cm`,
      solutionHTML:`${lB}${lC} = ${c2} cm`
    }
  ];
  return {
    titre:'Théorème de Pythagore — trouver un côté',
    enonceHTML,
    dessiner:(id)=>dessinerEchelle(id,{s1:lA,droit:lB,s2:lC,cote1Label:`${c1} cm`,cote2Label:``,hypLabel:`${hyp} cm`}),
    etapes
  };
}

      role:'Confirmer le résultat',

/* ===== SITUATION : Aire d'un disque ===== */
function genAireDisque(){
  const configs=[
    {r:5,contexte:'une pizza ronde'},
    {r:7,contexte:'une fontaine circulaire'},
    {r:3,contexte:'un couvercle rond'},
    {r:4,contexte:'une table circulaire'}
  ];
  const cfg=choix(configs);
  const r=cfg.r;
  const r2=r*r;
  const aire=Math.round(Math.PI*r2*100)/100;
  const aireCm2=Math.round(aire);
  const d=2*r;
  const circ=Math.round(2*Math.PI*r*100)/100;
  const enonceHTML=`On étudie ${cfg.contexte} de rayon <b>r = ${r} cm</b>.<br>`
    +`<b>1.</b> Rappelle la formule de l'aire d'un disque et calcule cette aire (arrondie au cm²).<br>`
    +`<b>2.</b> Calcule la circonférence (périmètre) de ce disque.<br>`
    +`<b>3.</b> Si le rayon est multiplié par 2, par quel nombre l'aire est-elle multipliée ? Justifie.<br>`
    +`<i>Rappel : π ≈ 3,14</i>`;
  const aire2r=Math.round(Math.PI*(2*r)*(2*r)*100)/100;
  const facteur=Math.round(aire2r/aire*10)/10;
  const etapes=[
    {
      question:'Question 1 — Aire du disque',
      role:'Rappeler et appliquer la formule A = π × r²',
      clavier:['π','²','×','='],
      q:`Écris la formule de l'aire d'un disque, puis calcule avec r = ${r} cm.`,
      verif:inp=>{
        const t=norm(inp);
        const hasPi=t.includes('pi')||t.includes('π');
        return (hasPi&&nbs(inp).some(x=>Math.abs(x-r2)<0.5))||nbs(inp).some(x=>Math.abs(x-aireCm2)<=2);
      },
      aide:`A = π × r² = π × ${r}² = π × ${r2} ≈ ${fr(aire)} cm²`,
      solutionHTML:`A = π × ${r2} ≈ ${fr(aire)} cm²`
    },
    {
      question:'Question 2 — Circonférence',
      role:'Appliquer C = 2 × π × r',
      clavier:['π','×','='],
      q:`Calcule la circonférence : C = 2 × π × ${r}.`,
      verif:inp=>nbs(inp).some(x=>Math.abs(x-circ)<=0.2),
      aide:`C = 2 × π × ${r} = 2 × ${r} × π ≈ ${fr(circ)} cm`,
      solutionHTML:`C = 2 × π × ${r} ≈ ${fr(circ)} cm`
    },
    {
      question:'Question 3 — Doublement du rayon',
      role:'Analyser l\'effet sur l\'aire',
      q:`Calcule l'aire avec r = ${2*r} cm. Par quel facteur l'aire a-t-elle été multipliée ?`,
      verif:inp=>{
        const ns=nbs(inp);
        return ns.some(x=>Math.abs(x-facteur)<=0.1)||ns.some(x=>Math.abs(x-aire2r)<=2);
      },
      aide:`A' = π × ${2*r}² = π × ${4*r2} ≈ ${fr(aire2r)} cm². Facteur = ${fr(aire2r)}/${fr(aire)} = ${fr(facteur)} = 4.`,
      solutionHTML:`A' ≈ ${fr(aire2r)} cm² : l'aire est multipliée par 4 (= 2²)`
    }
  ];
  return {
    titre:`Aire d'un disque — ${cfg.contexte}`,
    enonceHTML,
    dessiner:(id)=>{
      const W=340,H=280,cx=170,cy=130,R=r*14;
      const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Disque">`
        +`<circle cx="${cx}" cy="${cy}" r="${R}" fill="#d8edf8" stroke="#4FA3D1" stroke-width="2.5"/>`
        +`<line x1="${cx}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="#E07A1F" stroke-width="2.5"/>`
        +`<circle cx="${cx}" cy="${cy}" r="4" fill="#E07A1F"/>`
        +svgTxt(cx+R/2,cy-16,`r = ${r} cm`,14,'#E07A1F')
        +svgTxt(cx,cy+R+22,`Aire ≈ ${fr(aire)} cm²`,13,'#4FA3D1')
        +svgNonEchelle(W,H)
        +`</svg>`;
      document.getElementById(id).innerHTML=svg;
    },
    etapes
  };
}

/* ===== SITUATION : Volume d'un cône ou d'une pyramide ===== */

    const r=cfg.r,h=cfg.h;
    const r2=r*r;
    const vol=Math.round(Math.PI*r2*h/3*100)/100;
    const volArrondi=Math.round(vol*10)/10;
    const enonceHTML=`Un cône a un rayon de base <b>r = ${r} cm</b> et une hauteur <b>h = ${h} cm</b>.<br>`
      +`<b>1.</b> Calcule r².<br>`
      +`<b>2.</b> Rappelle et applique la formule du volume d'un cône.<br>`
      +`<b>3.</b> Donne une valeur approchée du volume arrondie au dixième.<br>`
      +`<i>Rappel : V = (1/3) × π × r² × h</i>`;
    const etapes=[
      {
        question:'Question 1 — Calcul de r²',
        role:'Calculer r²',
        clavier:['²','='],
        q:`Calcule r² = ${r}².`,
        verif:inp=>nbs(inp).some(x=>Math.abs(x-r2)<=0.5),
        aide:`${r}² = ${r2}`,
        solutionHTML:`r² = ${r2}`
      },
      {
        question:'Question 2 — Formule et application',
        role:'Écrire le volume exact',
        clavier:['π','×','÷','='],
        q:`Écris V = (1/3) × π × ${r2} × ${h}.`,
        verif:inp=>{
          const ns=nbs(inp);
          const t=norm(inp);
          return ns.some(x=>Math.abs(x-r2)<0.5)&&ns.some(x=>Math.abs(x-h)<0.5)&&(t.includes('pi')||t.includes('π'));
        },
        aide:`V = (1/3) × π × ${r2} × ${h}`,
        solutionHTML:`V = <span class="frac"><span class="num">1</span><span class="den">3</span></span> × π × ${r2} × ${h}`
      },
      {
        question:'Question 3 — Valeur approchée',
        role:'Calculer numériquement',
        clavier:['π','×','÷','≈','='],
        q:`Calcule V ≈ ? cm³ (arrondi au dixième).`,
        verif:inp=>nbs(inp).some(x=>Math.abs(x-volArrondi)<=0.5),
        aide:`V = π × ${r2} × ${h} ÷ 3 ≈ ${fr(volArrondi)} cm³`,
        solutionHTML:`V ≈ ${fr(volArrondi)} cm³`
      }
    ];
    return {
      titre:'Volume d\'un cône',
      enonceHTML,
      dessiner:(id)=>{
        const W=360,H=260,cx=180,botY=210,topY=52,rx=88,ry=22;
        const ellBase=`<ellipse cx="${cx}" cy="${botY}" rx="${rx}" ry="${ry}" fill="#FFE7B0" stroke="#E0A415" stroke-width="2"/>`;
        const sides=`<line x1="${cx-rx}" y1="${botY}" x2="${cx}" y2="${topY}" stroke="#E0A415" stroke-width="2.5"/>`
          +`<line x1="${cx+rx}" y1="${botY}" x2="${cx}" y2="${topY}" stroke="#E0A415" stroke-width="2.5"/>`;
        const apex=`<circle cx="${cx}" cy="${topY}" r="4" fill="#E07A1F"/>`;
        const labelR=`<line x1="${cx}" y1="${botY}" x2="${cx+rx}" y2="${botY}" stroke="#E07A1F" stroke-width="2" stroke-dasharray="4,3"/>`
          +svgTxt(cx+rx/2,botY+18,`r = ${r} cm`,14,'#E07A1F');
        const midH=(topY+botY)/2;
        const labelH=`<line x1="${cx}" y1="${topY}" x2="${cx}" y2="${botY}" stroke="#8A744C" stroke-width="1.5" stroke-dasharray="4,3"/>`
          +svgTxt(cx-32,midH,`h = ${h} cm`,14,'#E07A1F');
        const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cône">${ellBase}${sides}${apex}${labelR}${labelH}${svgNonEchelle(W,H)}</svg>`;
        document.getElementById(id).innerHTML=svg;
      },
      etapes
    };
  }
}

/* --- Générateur : Trigonométrie — trouver un angle --- */
function genAngleTrigono(){
  const configs=[
    {type:'arctan',opp:3,adj:4},{type:'arctan',opp:5,adj:12},
    {type:'arcsin',opp:6,hyp:10},{type:'arcsin',opp:7,hyp:25},
    {type:'arccos',adj:8,hyp:17}
  ];
  const cfg=choix(configs);
  let angleDeg,enonce,q1texte,q1aide,q1sol;
  if(cfg.type==='arctan'){
    angleDeg=Math.round(atand(cfg.opp/cfg.adj)*10)/10;
    enonce=`Dans un triangle rectangle, le côté opposé à l'angle A mesure <b>${cfg.opp} cm</b> et le côté adjacent mesure <b>${cfg.adj} cm</b>.<br><b>1.</b> Écris le rapport tan(A) = côté opposé ÷ côté adjacent.<br><b>2.</b> Calcule l'angle A en degrés (arrondi au dixième).`;
    q1texte=`tan(A) = ${cfg.opp} ÷ ${cfg.adj} = ?`;
    q1aide=`tan(A) = ${fr(cfg.opp/cfg.adj)}.`;
    q1sol=fr(Math.round(cfg.opp/cfg.adj*1000)/1000);
    return {
      titre:'Trouver un angle par la tangente',
      enonceHTML:enonce,
      dessiner:(id)=>{},
      etapes:[
        {
          question:'Question 1 — Rapport tan(A)',
          role:'Écrire le rapport trigonométrique',
          q:q1texte,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-cfg.opp/cfg.adj)<0.01),
          aide:q1aide,
          solutionHTML:q1sol,
          clavier:['÷','=']
        },
        {
          question:'Question 2 — Valeur de l\'angle A',
          role:'Appliquer arctan pour trouver l\'angle',
          q:`A = arctan(${fr(Math.round(cfg.opp/cfg.adj*1000)/1000)}) = ? ° (utilise tan⁻¹ sur la calculatrice)`,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-angleDeg)<0.5),
          aide:`arctan(${fr(Math.round(cfg.opp/cfg.adj*1000)/1000)}) ≈ ${fr(angleDeg)}°.`,
          solutionHTML:`A ≈ ${fr(angleDeg)}°`,
          clavier:['=','°']
        }
      ]
    };
  } else if(cfg.type==='arcsin'){
    angleDeg=Math.round(asind(cfg.opp/cfg.hyp)*10)/10;
    enonce=`Dans un triangle rectangle, le côté opposé à l'angle A mesure <b>${cfg.opp} cm</b> et l'hypoténuse mesure <b>${cfg.hyp} cm</b>.<br><b>1.</b> Écris le rapport sin(A) = côté opposé ÷ hypoténuse.<br><b>2.</b> Calcule l'angle A en degrés (arrondi au dixième).`;
    return {
      titre:'Trouver un angle par le sinus',
      enonceHTML:enonce,
      dessiner:(id)=>{},
      etapes:[
        {
          question:'Question 1 — Rapport sin(A)',
          role:'Écrire le rapport trigonométrique',
          q:`sin(A) = ${cfg.opp} ÷ ${cfg.hyp} = ?`,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-cfg.opp/cfg.hyp)<0.01),
          aide:`sin(A) = ${fr(Math.round(cfg.opp/cfg.hyp*1000)/1000)}.`,
          solutionHTML:fr(Math.round(cfg.opp/cfg.hyp*1000)/1000),
          clavier:['÷','=']
        },
        {
          question:'Question 2 — Valeur de l\'angle A',
          role:'Appliquer arcsin pour trouver l\'angle',
          q:`A = arcsin(${fr(Math.round(cfg.opp/cfg.hyp*1000)/1000)}) = ? °`,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-angleDeg)<0.5),
          aide:`arcsin(${fr(Math.round(cfg.opp/cfg.hyp*1000)/1000)}) ≈ ${fr(angleDeg)}°.`,
          solutionHTML:`A ≈ ${fr(angleDeg)}°`,
          clavier:['=','°']
        }
      ]
    };
  } else {
    angleDeg=Math.round(acosd(cfg.adj/cfg.hyp)*10)/10;
    enonce=`Dans un triangle rectangle, le côté adjacent à l'angle A mesure <b>${cfg.adj} cm</b> et l'hypoténuse mesure <b>${cfg.hyp} cm</b>.<br><b>1.</b> Écris le rapport cos(A) = côté adjacent ÷ hypoténuse.<br><b>2.</b> Calcule l'angle A en degrés (arrondi au dixième).`;
    return {
      titre:'Trouver un angle par le cosinus',
      enonceHTML:enonce,
      dessiner:(id)=>{},
      etapes:[
        {
          question:'Question 1 — Rapport cos(A)',
          role:'Écrire le rapport trigonométrique',
          q:`cos(A) = ${cfg.adj} ÷ ${cfg.hyp} = ?`,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-cfg.adj/cfg.hyp)<0.01),
          aide:`cos(A) = ${fr(Math.round(cfg.adj/cfg.hyp*1000)/1000)}.`,
          solutionHTML:fr(Math.round(cfg.adj/cfg.hyp*1000)/1000),
          clavier:['÷','=']
        },
        {
          question:'Question 2 — Valeur de l\'angle A',
          role:'Appliquer arccos pour trouver l\'angle',
          q:`A = arccos(${fr(Math.round(cfg.adj/cfg.hyp*1000)/1000)}) = ? °`,
          verif:(inp)=>nbs(inp).some(x=>Math.abs(x-angleDeg)<0.5),
          aide:`arccos(${fr(Math.round(cfg.adj/cfg.hyp*1000)/1000)}) ≈ ${fr(angleDeg)}°.`,
          solutionHTML:`A ≈ ${fr(angleDeg)}°`,
          clavier:['=','°']
        }
      ]
    };
  }
}

/* --- Générateur : Symétrie axiale — coordonnées du symétrique --- */
function genSymetrieAxiale(){
  const configs=[
    {axe:'x',val:3,Ax:2,Ay:5},{axe:'x',val:0,Ax:-1,Ay:4},
    {axe:'y',val:2,Ax:5,Ay:3},{axe:'y',val:0,Ax:4,Ay:-2},
    {axe:'x',val:1,Ax:3,Ay:-2}
  ];
  const cfg=choix(configs);
  let AxSym,AySym,axeLabel,q2text;
  if(cfg.axe==='x'){
    axeLabel='y = '+cfg.val;
    AxSym=cfg.Ax;
    AySym=2*cfg.val-cfg.Ay;
    q2text=`Le symétrique de A(${cfg.Ax} ; ${cfg.Ay}) par rapport à la droite y = ${cfg.val} a la même abscisse. L'ordonnée : 2×${cfg.val} − ${cfg.Ay} = ?`;
  } else {
    axeLabel='x = '+cfg.val;
    AxSym=2*cfg.val-cfg.Ax;
    AySym=cfg.Ay;
    q2text=`Le symétrique de A(${cfg.Ax} ; ${cfg.Ay}) par rapport à la droite x = ${cfg.val} a la même ordonnée. L'abscisse : 2×${cfg.val} − ${cfg.Ax} = ?`;
  }
  const enonceHTML=`Dans un repère, on place le point A(${cfg.Ax} ; ${cfg.Ay}).<br>On cherche son symétrique A' par rapport à la droite d'équation <b>${axeLabel}</b>.<br><b>1.</b> Quelle coordonnée reste inchangée lors de cette symétrie ?<br><b>2.</b> Calcule la coordonnée modifiée.`;
  return {
    titre:'Symétrie axiale et coordonnées',
    enonceHTML,
    dessiner:(id)=>{
      const W=340,H=280,ox=170,oy=140,scale=28;
      const line=(x1,y1,x2,y2,col,w)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w||1.5}"/>`;
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg+=line(10,oy,W-10,oy,'#ccc',1)+line(ox,10,ox,H-10,'#ccc',1);
      for(let i=-5;i<=5;i++){
        if(i!==0){
          svg+=`<line x1="${ox+i*scale}" y1="${oy-4}" x2="${ox+i*scale}" y2="${oy+4}" stroke="#bbb" stroke-width="1"/>`;
          svg+=`<line x1="${ox-4}" y1="${oy-i*scale}" x2="${ox+4}" y2="${oy-i*scale}" stroke="#bbb" stroke-width="1"/>`;
        }
      }
      if(cfg.axe==='x'){
        const yAxe=oy-cfg.val*scale;
        svg+=line(10,yAxe,W-10,yAxe,'#4FA3D1',2.5);
        svg+=svgTxt(W-30,yAxe-10,'y='+cfg.val,12,'#4FA3D1');
      } else {
        const xAxe=ox+cfg.val*scale;
        svg+=line(xAxe,10,xAxe,H-10,'#4FA3D1',2.5);
        svg+=svgTxt(xAxe+18,20,'x='+cfg.val,12,'#4FA3D1');
      }
      const pAx=ox+cfg.Ax*scale,pAy=oy-cfg.Ay*scale;
      svg+=`<circle cx="${pAx}" cy="${pAy}" r="5" fill="#E07A1F"/>`;
      svg+=svgTxt(pAx+14,pAy-8,'A('+cfg.Ax+';'+cfg.Ay+')',12,'#E07A1F');
      const pSx=ox+AxSym*scale,pSy=oy-AySym*scale;
      svg+=`<circle cx="${pSx}" cy="${pSy}" r="5" fill="#6FA52A" opacity="0.5"/>`;
      svg+=svgTxt(pSx+14,pSy-8,"A'(?)",12,'#6FA52A');
      svg+=svgNonEchelle(W,H);
      svg+='</svg>';
      document.getElementById(id).innerHTML=svg;
    },
    etapes:[
      {
        question:'Question 1 — Coordonnée inchangée',
        role:'Identifier l\'axe de symétrie',
        q:cfg.axe==='x'
          ?`La droite ${axeLabel} est horizontale. Quelle coordonnée reste inchangée : l'abscisse ou l'ordonnée ? Donne la valeur inchangée.`
          :`La droite ${axeLabel} est verticale. Quelle coordonnée reste inchangée : l'abscisse ou l'ordonnée ? Donne la valeur inchangée.`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-(cfg.axe==='x'?cfg.Ax:cfg.Ay))<0.5),
        aide:cfg.axe==='x'?`L'abscisse reste ${cfg.Ax}.`:`L'ordonnée reste ${cfg.Ay}.`,
        solutionHTML:cfg.axe==='x'?`Abscisse inchangée : ${cfg.Ax}`:`Ordonnée inchangée : ${cfg.Ay}`,
        clavier:['=']
      },
      {
        question:'Question 2 — Coordonnée du symétrique',
        role:'Calculer la coordonnée modifiée',
        q:q2text,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-(cfg.axe==='x'?AySym:AxSym))<0.5),
        aide:cfg.axe==='x'
          ?`2 × ${cfg.val} − (${cfg.Ay}) = ${2*cfg.val} − ${cfg.Ay} = ${AySym}.`
          :`2 × ${cfg.val} − (${cfg.Ax}) = ${2*cfg.val} − ${cfg.Ax} = ${AxSym}.`,
        solutionHTML:`A'(${AxSym} ; ${AySym})`,
        clavier:['×','-','=']
      }
    ]
  };
}

/* --- Générateur : Droites parallèles et angles --- */
function genDroitesParalleles(){
  const configs=[
    {angle:55,type:'correspondants'},{angle:72,type:'correspondants'},
    {angle:38,type:'alternes-internes'},{angle:64,type:'alternes-internes'},
    {angle:120,type:'correspondants'}
  ];
  const cfg=choix(configs);
  const alpha=cfg.angle;
  const beta=cfg.type==='correspondants'?alpha:(180-alpha);
  const enonceHTML=`Deux droites <b>d₁</b> et <b>d₂</b> sont parallèles, coupées par une sécante. L'angle α (formé par la sécante et d₁) mesure <b>${alpha}°</b>.<br><b>1.</b> Quels sont les angles ${cfg.type==='correspondants'?'correspondants':'alternes-internes'} à α ?<br><b>2.</b> Calcule la valeur de l'angle β situé du côté de d₂.`;
  return {
    titre:'Droites parallèles et angles',
    enonceHTML,
    dessiner:(id)=>{
      const W=360,H=240;
      const alphaRad=alpha*Math.PI/180;
      const midY1=80,midY2=170,midX=180;
      const dx=120*Math.cos(alphaRad),dy=120*Math.sin(alphaRad);
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg+=`<line x1="20" y1="${midY1}" x2="${W-20}" y2="${midY1}" stroke="#4FA3D1" stroke-width="2.5"/>`;
      svg+=`<line x1="20" y1="${midY2}" x2="${W-20}" y2="${midY2}" stroke="#4FA3D1" stroke-width="2.5"/>`;
      svg+=svgTxt(W-30,midY1-12,'d₁',14,'#4FA3D1');
      svg+=svgTxt(W-30,midY2-12,'d₂',14,'#4FA3D1');
      svg+=`<line x1="${midX-dx}" y1="${midY1-dy}" x2="${midX+dx}" y2="${midY1+dy}" stroke="#E07A1F" stroke-width="2"/>`;
      svg+=`<line x1="${midX-dx}" y1="${midY2-dy}" x2="${midX+dx}" y2="${midY2+dy}" stroke="#E07A1F" stroke-width="2"/>`;
      svg+=svgTxt(midX+40,midY1-20,'α = '+alpha+'°',13,'#E07A1F');
      svg+=svgTxt(midX+40,midY2+24,'β = ?',13,'#6FA52A');
      svg+=svgNonEchelle(W,H);
      svg+='</svg>';
      document.getElementById(id).innerHTML=svg;
    },
    etapes:[
      {
        question:'Question 1 — Identifier le type d\'angles',
        role:'Nommer la propriété des angles',
        q:cfg.type==='correspondants'
          ?`Les angles correspondants sont du même côté de la sécante, l'un sur d₁ l'autre sur d₂. Si les droites sont parallèles, ils sont... (égaux ou supplémentaires ?)`
          :`Les angles alternes-internes sont de part et d'autre de la sécante, entre d₁ et d₂. Si les droites sont parallèles, ils sont... (égaux ou supplémentaires ?)`,
        verif:(inp)=>norm(inp).includes('egaux')||norm(inp).includes('egal')||norm(inp).includes('='),
        aide:cfg.type==='correspondants'
          ?'Les angles correspondants sont égaux quand les droites sont parallèles.'
          :'Les angles alternes-internes sont égaux quand les droites sont parallèles.',
        solutionHTML:'Ils sont égaux.',
        clavier:['=']
      },
      {
        question:'Question 2 — Valeur de β',
        role:'Calculer l\'angle β',
        q:cfg.type==='correspondants'
          ?`β est l'angle correspondant à α = ${alpha}°. Quelle est la valeur de β ?`
          :`β est l'angle alterne-interne de α = ${alpha}°. Quelle est la valeur de β ? (rappel : ils sont supplémentaires ici car α est obtus)`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-beta)<0.5),
        aide:cfg.type==='correspondants'
          ?`β = α = ${beta}°.`
          :`β = 180° − ${alpha}° = ${beta}°.`,
        solutionHTML:`β = ${beta}°`,
        clavier:['-','=','°']
      }
    ]
  };
}

/* --- Générateur : Pythagore — 3 configurations --- */
function genPythagoreConfigs(){
  const typeEx=rnd(3);
  let a,b,c,titre,enonce,etapes;
  if(typeEx===0){
    const configs=[{a:6,b:8},{a:5,b:12},{a:9,b:12},{a:8,b:15}];
    const cfg=choix(configs);
    a=cfg.a;b=cfg.b;
    c=Math.round(Math.sqrt(a*a+b*b)*100)/100;
    titre='Pythagore — calculer l\'hypoténuse';
    enonce=`Dans un triangle rectangle, les deux côtés de l'angle droit mesurent <b>${a} cm</b> et <b>${b} cm</b>.<br><b>1.</b> Écris la relation de Pythagore pour ce triangle.<br><b>2.</b> Calcule l'hypoténuse (arrondie au centième).`;
    etapes=[
      {
        question:'Question 1 — Relation de Pythagore',
        role:'Écrire l\'égalité de Pythagore',
        q:`Complète : hyp² = ${a}² + ${b}² = ?`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-(a*a+b*b))<0.5),
        aide:`${a}² = ${a*a} ; ${b}² = ${b*b}. Somme = ${a*a+b*b}.`,
        solutionHTML:`hyp² = ${a*a+b*b}`,
        clavier:['²','+','=']
      },
      {
        question:'Question 2 — Longueur de l\'hypoténuse',
        role:'Extraire la racine carrée',
        q:`hyp = √${a*a+b*b} = ? cm`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-c)<0.05),
        aide:`√${a*a+b*b} ≈ ${fr(c)} cm.`,
        solutionHTML:`hyp ≈ ${fr(c)} cm`,
        clavier:['√','=']
      }
    ];
  } else if(typeEx===1){
    const configs=[{hyp:13,a:5},{hyp:17,a:8},{hyp:25,a:7},{hyp:15,a:9}];
    const cfg=choix(configs);
    c=cfg.hyp;a=cfg.a;
    b=Math.round(Math.sqrt(c*c-a*a)*100)/100;
    titre='Pythagore — calculer un côté de l\'angle droit';
    enonce=`Dans un triangle rectangle, l'hypoténuse mesure <b>${c} cm</b> et un côté de l'angle droit mesure <b>${a} cm</b>.<br><b>1.</b> Applique Pythagore pour isoler le côté inconnu.<br><b>2.</b> Calcule sa longueur (arrondie au centième si besoin).`;
    etapes=[
      {
        question:'Question 1 — Isoler le côté inconnu',
        role:'Réarranger la relation de Pythagore',
        q:`côté² = ${c}² − ${a}² = ${c*c} − ${a*a} = ?`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-(c*c-a*a))<0.5),
        aide:`${c*c} − ${a*a} = ${c*c-a*a}.`,
        solutionHTML:`côté² = ${c*c-a*a}`,
        clavier:['²','-','=']
      },
      {
        question:'Question 2 — Longueur du côté',
        role:'Extraire la racine carrée',
        q:`côté = √${c*c-a*a} = ? cm`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-b)<0.05),
        aide:`√${c*c-a*a} ≈ ${fr(b)} cm.`,
        solutionHTML:`côté ≈ ${fr(b)} cm`,
        clavier:['√','=']
      }
    ];
  } else {
    const configs=[{a:3,b:4,hyp:5},{a:6,b:8,hyp:10},{a:5,b:12,hyp:13}];
    const cfg=choix(configs);
    a=cfg.a;b=cfg.b;c=cfg.hyp;
    titre='Pythagore — vérifier un triangle rectangle';
    enonce=`Un triangle a pour côtés <b>${a} cm</b>, <b>${b} cm</b> et <b>${c} cm</b>.<br><b>1.</b> Calcule ${a}² + ${b}² et compare à ${c}².<br><b>2.</b> Ce triangle est-il rectangle ?`;
    etapes=[
      {
        question:'Question 1 — Calcul des carrés',
        role:'Comparer la somme des carrés des petits côtés au carré du grand',
        q:`${a}² + ${b}² = ${a*a} + ${b*b} = ? et ${c}² = ?`,
        verif:(inp)=>nbs(inp).some(x=>Math.abs(x-(a*a+b*b))<0.5)&&nbs(inp).some(x=>Math.abs(x-c*c)<0.5),
        aide:`${a*a} + ${b*b} = ${a*a+b*b} et ${c}² = ${c*c}.`,
        solutionHTML:`${a*a+b*b} = ${c*c}`,
        clavier:['²','+','=']
      },
      {
        question:'Question 2 — Conclusion',
        role:'Appliquer la réciproque du théorème de Pythagore',
        q:`Puisque ${a*a+b*b} ${a*a+b*b===c*c?'=':'≠'} ${c*c}, ce triangle est-il rectangle ?`,
        verif:(inp)=>a*a+b*b===c*c
          ?(norm(inp).includes('oui')||norm(inp).includes('rect'))
          :(norm(inp).includes('non')||norm(inp).includes('pas')),
        aide:a*a+b*b===c*c
          ?`${a*a+b*b} = ${c*c} donc oui, le triangle est rectangle.`
          :`${a*a+b*b} ≠ ${c*c} donc non, le triangle n'est pas rectangle.`,
        solutionHTML:a*a+b*b===c*c?'Oui, il est rectangle.':'Non, il n\'est pas rectangle.',
        clavier:['=']
      }
    ];
  }
  return {titre,enonceHTML:enonce,dessiner:(id)=>{},etapes};
}

/* --- Générateur : Section d'un solide par un plan --- */
function genSectionSolide(){
  const configs=[
    {
      solide:'cylindre',
      plans:[
        {plan:'perpendiculaire à l\'axe',section:'un disque (cercle)',rep:['disque','cercle']},
        {plan:'parallèle à l\'axe',section:'un rectangle',rep:['rectangle']}
      ]
    },
    {
      solide:'cône',
      plans:[
        {plan:'perpendiculaire à l\'axe (à mi-hauteur)',section:'un disque (cercle)',rep:['disque','cercle']},
        {plan:'passant par le sommet et la base',section:'un triangle isocèle',rep:['triangle']}
      ]
    },
    {
      solide:'cube',
      plans:[
        {plan:'parallèle à une face',section:'un carré',rep:['carre','carré']},
        {plan:'passant par 4 arêtes opposées',section:'un rectangle',rep:['rectangle']}
      ]
    }
  ];
  const cfg=choix(configs);
  const planCfg=choix(cfg.plans);
  const enonceHTML=`On coupe un <b>${cfg.solide}</b> par un plan <b>${planCfg.plan}</b>.<br><b>1.</b> Quelle forme a la section obtenue ?<br><b>2.</b> Explique brièvement pourquoi.`;
  return {
    titre:'Section d\'un solide par un plan',
    enonceHTML,
    dessiner:(id)=>{},
    etapes:[
      {
        question:'Question 1 — Forme de la section',
        role:'Identifier la section plane',
        q:`En coupant ce ${cfg.solide} par un plan ${planCfg.plan}, quelle forme géométrique obtient-on ?`,
        verif:(inp)=>planCfg.rep.some(r=>norm(inp).includes(r)),
        aide:`La section est ${planCfg.section}.`,
        solutionHTML:planCfg.section,
        clavier:[]
      },
      {
        question:'Question 2 — Justification',
        role:'Expliquer en s\'appuyant sur la forme du solide',
        q:`Pourquoi la section est-elle ${planCfg.section} ? (une phrase suffit)`,
        verif:(inp)=>norm(inp).length>5,
        aide:cfg.solide==='cylindre'
          ?'Un cylindre a une base circulaire — un plan perpendiculaire coupe un disque, parallèle coupe un rectangle.'
          :cfg.solide==='cône'
          ?'Un cône se rétrécit vers le sommet — coupe perpendiculaire → disque, coupe axiale → triangle.'
          :'Les faces d\'un cube sont des carrés — un plan parallèle donne toujours un carré.',
        solutionHTML:`La section est ${planCfg.section} car la forme du ${cfg.solide} l'impose.`,
        clavier:[]
      }
    ]
  };
}

  {notion:'rampe',gen:genRampe},
  {notion:'voile',gen:genVoile},
  {notion:'echelle',gen:genEchelle},
  {notion:'terrain',gen:genTerrain},
  {notion:'thales',gen:genThales},
  {notion:'fleuve',gen:genFleuve},
  {notion:'sinus',gen:genSinus},
  {notion:'angles',gen:genVoieAngles},
  {notion:'stade',gen:genStade},
  {notion:'pythagore',gen:genPythagore},
  {notion:'thalesOmbre',gen:genThalesOmbre},
  {notion:'trigono',gen:genTrigono},
  {notion:'transfo',gen:genTransfo},
  {notion:'solide',gen:genSolide},
  {notion:'pythagoreCoté',gen:genPythagoreCoté},
  {notion:'thalesLongueur',gen:genThalesLongueur},
  {notion:'aireDisque',gen:genAireDisque},
  {notion:'volumeSolide',gen:genVolumeSolide},
  {notion:'angleTrigono',     gen:genAngleTrigono},
  {notion:'symetrieAxiale',   gen:genSymetrieAxiale},
  {notion:'droitesParalleles',gen:genDroitesParalleles},
  {notion:'pythagoreConfigs', gen:genPythagoreConfigs},
  {notion:'sectionSolide',    gen:genSectionSolide}
];

let SUJET=[],ecrans=[],ecranActuel=0;
function tirerSujet(n){SUJET=melange(BANQUE.slice()).slice(0,n).map(b=>b.gen());}
function construireEcrans(){
  const zone=document.getElementById('zone-ecrans');zone.innerHTML='';
  const n=SUJET.length,mot=n>1?n+' exercices':'un exercice';
  zone.insertAdjacentHTML('beforeend',`<div class="carte ecran" data-section="intro"><span class="badge-theme">Espace et géométrie</span><h2>Brevet blanc — sujet du jour</h2><p class="consigne">Voici ${mot} de type brevet : une situation concrète, avec une figure, et plusieurs questions. Tu rédiges chaque étape toi-même. Recharge la page pour un nouveau tirage.</p><p class="consigne sous">Calculatrice en bas à droite.</p><div class="ligne-btn"><button class="btn btn-vert" onclick="ecranSuivant()">Commencer</button></div></div>`);
  SUJET.forEach((ex,i)=>{
    const dernier=i===SUJET.length-1;
    zone.insertAdjacentHTML('beforeend',`<div class="carte ecran cache" data-section="exo${i}"><h2><span class="num">Exercice ${i+1}</span> — ${ex.titre}</h2><div class="consigne" id="enonce-${i}">${ex.enonceHTML}</div><div class="figure" id="figure-${i}"></div><div id="redac-${i}"></div><div class="ligne-btn cache" id="suite-${i}"><button class="btn btn-vert" onclick="ecranSuivant()">${dernier?'Terminer':'Exercice suivant'}</button></div></div>`);
  });
  zone.insertAdjacentHTML('beforeend',`<div class="carte ecran fin cache" data-section="fin"><h2>Sujet terminé &#x1F389;</h2><p class="consigne">Tu as rédigé toutes les questions.</p><div class="ligne-btn"><button class="btn btn-jaune" onclick="location.reload()">Nouveau sujet</button></div></div>`);
  SUJET.forEach((ex,i)=>{ex.dessiner('figure-'+i);construireRedaction('redac-'+i,ex.etapes,()=>document.getElementById('suite-'+i).classList.remove('cache'));});
}

/* ===== PROGRESSION + NAVIGATION ===== */
function construireProgression(){const p=document.getElementById('progression');p.innerHTML="";for(let i=0;i<ecrans.length;i++){const d=document.createElement('div');d.className='pas';p.appendChild(d);}majProgression();}
function majProgression(){document.querySelectorAll('#progression .pas').forEach((d,i)=>{d.className='pas'+(i<ecranActuel?' fait':i===ecranActuel?' actif':'');});}
function montrerEcran(i){ecrans.forEach((e,k)=>e.classList.toggle('cache',k!==i));ecranActuel=i;majProgression();window.scrollTo({top:0,behavior:'smooth'});}
function ecranSuivant(){if(ecranActuel<ecrans.length-1)montrerEcran(ecranActuel+1);}
function sautQuestion(){ecranSuivant();}
function sautSection(){const sec=ecrans[ecranActuel].dataset.section;for(let i=ecranActuel+1;i<ecrans.length;i++){if(ecrans[i].dataset.section!==sec){montrerEcran(i);return;}}montrerEcran(ecrans.length-1);}
document.addEventListener('focusin',e=>{if(e.target.matches&&e.target.matches('.etape input[type=text]'))dernierChamp=e.target;});
window.addEventListener('DOMContentLoaded',()=>{
  tirerSujet(Math.min(2,BANQUE.length));
  construireEcrans();
  ecrans=Array.from(document.querySelectorAll('#zone-ecrans .ecran'));
  construireProgression();
  montrerEcran(0);
});
</script>
