<!DOCTYPE html>
<html lang="fr">
<head><script>try{if(!localStorage.getItem('kc_eleve')||!localStorage.getItem('kc_classe'))location.replace('index.html');}catch(e){}</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automatismes — Entraînement DNB (TEST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#FFC93C; --or-bas:#E0A41E;
  --vert:#8BC34A; --vert-bas:#5E9426;
  --orange:#FF8A4C; --orange-bas:#E0672E;
  --teal:#46BECB; --teal-bas:#2E8A98;
  --violet:#A78BC4; --violet-bas:#7E61A1;
  --rouge:#EF5D60; --rouge-bas:#c43e41;
  --bleu:#4FA3D1; --bleu-bas:#2f7ba8;
  --bois:#5C3D2E; --bois-clair:#8a6650;
  --creme:#FFF4DC; --blanc:#FFFDF6;
  --ombre:0 8px 0 rgba(92,61,46,.18), 0 14px 22px rgba(92,61,46,.12);
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--creme);
  min-height:100vh;
  padding:16px;
  color:var(--bois);
}
.wrap{max-width:680px;margin:0 auto;}




/* Screens */
.screen{display:none;}
.screen.active{display:block;}

/* Header parcours */
.entete{
  background:linear-gradient(135deg,var(--or),var(--orange));border-radius:24px;padding:22px;
  color:var(--bois);text-align:center;box-shadow:0 6px 0 var(--orange-bas);margin-bottom:18px;
}
.entete h1{font-family:'Fredoka',sans-serif;font-size:2rem;font-weight:700;margin-bottom:6px;}
.entete p{font-size:1rem;opacity:.85;font-weight:600;}

/* Écran accueil */
.accueil-puces{
  background:var(--blanc);border-radius:22px;padding:22px;box-shadow:var(--ombre);margin:0 0 20px;
}
.accueil-puces ul{list-style:none;padding:0;}
.accueil-puces li{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;
  padding:12px 14px;border-radius:12px;margin-bottom:10px;
  background:var(--creme);border-left:5px solid var(--or);
  line-height:1.5;
}
.accueil-puces li:last-child{margin-bottom:0;}
.btn-commencer{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.3rem;color:#fff;
  background:var(--vert);border:none;border-radius:18px;padding:16px 40px;
  cursor:pointer;box-shadow:0 6px 0 var(--vert-bas);display:block;margin:0 auto;
  transition:transform .1s;
}
.btn-commencer:active{transform:translateY(5px);box-shadow:0 1px 0 var(--vert-bas);}
.btn-commencer:hover{filter:brightness(1.05);}

/* Barre de progression */
.prog-bar{height:10px;background:#e7d3a8;border-radius:6px;margin-bottom:18px;overflow:hidden;}
.prog-fill{height:100%;background:var(--or);border-radius:6px;transition:width .3s;}

/* Card question */
.q-card{background:var(--blanc);border-radius:22px;padding:22px;box-shadow:var(--ombre);margin:0 0 16px;}
.q-num{font-family:'Fredoka',sans-serif;color:var(--bois-clair);font-size:1rem;margin-bottom:6px;}
.q-badge{
  display:inline-block;background:var(--teal);color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;
  font-size:.8rem;padding:3px 12px;border-radius:20px;margin-bottom:12px;
}
.q-texte{font-size:1.1rem;font-weight:700;line-height:1.6;white-space:pre-line;margin-bottom:4px;}

/* Options QCM */
.opts{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;}
.opt{
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;
  border:2.5px solid #e7d3a8;background:var(--blanc);color:var(--bois);
  border-radius:14px;padding:11px 18px;cursor:pointer;transition:border-color .1s, background .1s;
  text-align:left;
}
.opt:hover:not(:disabled){border-color:var(--or);background:var(--creme);}
.opt.choisi{border-color:var(--or-bas);background:var(--creme);}
.opt.bon{border-color:var(--vert-bas) !important;background:#eef8e3 !important;color:var(--vert-bas) !important;}
.opt.mauvais{border-color:var(--rouge-bas) !important;background:#fee !important;color:var(--rouge-bas) !important;}
.opt:disabled{cursor:not-allowed;}

/* Boutons VF */
.vf-opts{display:flex;gap:14px;margin:14px 0;}
.vf-btn{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.2rem;border:none;border-radius:16px;
  padding:14px 30px;cursor:pointer;color:#fff;transition:transform .1s;
}
.vf-vrai{background:var(--vert);box-shadow:0 5px 0 var(--vert-bas);}
.vf-faux{background:var(--rouge);box-shadow:0 5px 0 var(--rouge-bas);}
.vf-btn:active{transform:translateY(4px);}
.vf-btn.choisi-vrai{background:var(--vert);box-shadow:0 2px 0 var(--vert-bas);transform:translateY(3px);}
.vf-btn.choisi-faux{background:var(--rouge);box-shadow:0 2px 0 var(--rouge-bas);transform:translateY(3px);}
.vf-btn:disabled{cursor:not-allowed;opacity:.7;}

/* Saisie numérique / texte court */
.saisie-zone{display:flex;align-items:center;gap:12px;margin:14px 0;}
.num-input{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.4rem;text-align:center;
  border:3px solid #e7d3a8;border-radius:14px;padding:12px;width:200px;color:var(--bois);
  background:var(--blanc);
}
.num-input:focus{outline:none;border-color:var(--or-bas);}
.num-input:disabled{background:#f5f5f5;color:#999;}

/* Bouton valider */
.btn-valider{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;background:var(--or);
  border:none;border-radius:16px;padding:13px 24px;cursor:pointer;box-shadow:0 5px 0 var(--or-bas);
  margin-top:6px;
}
.btn-valider:active{transform:translateY(4px);box-shadow:0 1px 0 var(--or-bas);}
.btn-valider:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:0 5px 0 var(--or-bas);}

/* Feedback */
.feedback{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  margin-top:12px;padding:12px 14px;border-radius:12px;min-height:1em;display:none;
}
.feedback.bon{background:#eef8e3;color:var(--vert-bas);display:block;}
.feedback.mauvais{background:#fee6e3;color:var(--rouge-bas);display:block;}
.feedback .expl{font-weight:600;font-size:.9rem;margin-top:4px;opacity:.9;}

/* Btn suite */
.btn-suite{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1rem;color:#fff;background:var(--teal);
  border:none;border-radius:14px;padding:12px 22px;cursor:pointer;
  box-shadow:0 5px 0 var(--teal-bas);margin-top:10px;display:none;
}
.btn-suite:active{transform:translateY(4px);box-shadow:0 1px 0 var(--teal-bas);}

/* Zone boutons action */
.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:4px;}

/* Écran fin */
.fin-card{background:var(--blanc);border-radius:22px;padding:26px;box-shadow:var(--ombre);margin-bottom:18px;text-align:center;}
.score-cercle{
  width:120px;height:120px;border-radius:50%;background:var(--or);
  box-shadow:0 6px 0 var(--or-bas);
  display:grid;place-items:center;margin:0 auto 18px;
  font-family:'Fredoka',sans-serif;font-size:2rem;color:var(--bois);font-weight:700;
}
.fin-msg{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:8px;color:var(--bois);}
.btn-nouvelle{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;
  background:var(--vert);border:none;border-radius:16px;padding:14px 30px;
  cursor:pointer;box-shadow:0 5px 0 var(--vert-bas);margin-top:14px;
}
.btn-nouvelle:active{transform:translateY(4px);box-shadow:0 1px 0 var(--vert-bas);}

/* Revue */
.revue-titre{font-family:'Fredoka',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:12px;color:var(--bois);}
.revue-item{
  display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:14px;margin:8px 0;
  font-family:'Nunito',sans-serif;font-size:.93rem;
}
.revue-item.bon{background:#eef8e3;}
.revue-item.mauvais{background:#fee6e3;}
.revue-check{font-size:1.2rem;flex:0 0 24px;padding-top:2px;}
.revue-contenu{flex:1;}
.revue-q{font-weight:700;line-height:1.4;margin-bottom:4px;white-space:pre-line;}
.revue-reps{font-size:.88rem;line-height:1.5;}
.revue-reps .ta-rep{color:var(--rouge-bas);}
.revue-reps .bon-rep{color:var(--vert-bas);font-weight:700;}
.revue-reps .expl{color:var(--bois-clair);font-style:italic;}

/* Zone brouillon */
.brouillon-zone{background:var(--creme);border-radius:16px;padding:14px;margin-top:14px;border:2px dashed #e7d3a8;}
.brouillon-titre{font-family:'Fredoka',sans-serif;font-size:.88rem;color:var(--bois-clair);font-weight:600;margin-bottom:8px;letter-spacing:.3px;}
.brouillon-sym{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.brouillon-sym button{font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;border:none;cursor:pointer;background:var(--blanc);color:var(--bois);border-radius:8px;padding:6px 10px;box-shadow:0 2px 0 #e7d3a8;min-width:36px;text-align:center;}
.brouillon-sym button:active{transform:translateY(1px);box-shadow:0 1px 0 #e7d3a8;}
.brouillon-txt{width:100%;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;border:2px solid #e7d3a8;border-radius:12px;padding:10px 12px;resize:vertical;min-height:72px;color:var(--bois);background:var(--blanc);line-height:1.6;}
.brouillon-txt:focus{outline:none;border-color:var(--or-bas);}

/* Responsive */
@media(max-width:480px){
  .entete h1{font-size:1.6rem;}
  .opt{font-size:.95rem;padding:10px 14px;}
  .num-input{width:160px;font-size:1.2rem;}
  .vf-btn{padding:12px 20px;}
}
.prog-bloc{background:#EFF8FF;border-radius:14px;padding:10px 12px;margin:8px 0;font-family:'Fredoka',sans-serif}
.prog-ligne{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:4px 0;border-radius:10px;background:#fff;font-weight:600;font-size:1rem;color:var(--bois);border-left:5px solid #4FA3D1}
.prog-ligne.affectation{border-left-color:#FF8A4C}
.prog-ligne.boucle{border-left-color:#FFC93C}
.prog-ligne.condition{border-left-color:#A78BC4}
.prog-ligne.affichage{border-left-color:#8BC34A}
.prog-ligne .pico{font-size:1.1rem;flex-shrink:0}
.prog-intro{font-weight:700;margin-bottom:6px}
.prog-question{font-weight:700;margin-top:10px}

/* Calculatrice */
.kc-fab{
  position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;
  background:var(--bleu);box-shadow:0 5px 0 var(--bleu-bas);border:none;cursor:pointer;
  font-size:1.6rem;color:#fff;display:flex;align-items:center;justify-content:center;
  z-index:200;transition:transform .1s;
}
.kc-fab:active{transform:translateY(4px);box-shadow:0 1px 0 var(--bleu-bas);}
.kc-panel{
  position:fixed;bottom:86px;right:20px;background:var(--blanc);border-radius:20px;
  box-shadow:0 8px 32px rgba(92,61,46,.18);padding:16px;width:260px;z-index:199;
  display:none;flex-direction:column;gap:8px;
}
.kc-panel.open{display:flex;}
.kc-affichage{
  font-family:'Fredoka',sans-serif;font-size:1.5rem;text-align:right;
  background:var(--creme);border-radius:12px;padding:10px 14px;
  min-height:52px;word-break:break-all;color:var(--bois);border:2px solid #e7d3a8;
}
.kc-grille{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.kc-btn{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.1rem;
  border:none;border-radius:12px;padding:12px 0;cursor:pointer;
  background:var(--creme);color:var(--bois);box-shadow:0 3px 0 #e7d3a8;
  transition:transform .1s;
}
.kc-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #e7d3a8;}
.kc-btn.op{background:#fff3d0;color:var(--or-bas);}
.kc-btn.eg{background:var(--or);color:#fff;box-shadow:0 3px 0 var(--or-bas);}
.kc-btn.cl{background:#ffe0d0;color:var(--orange-bas);}
.kc-send{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:.95rem;color:#fff;
  background:var(--vert);border:none;border-radius:12px;padding:10px;cursor:pointer;
  box-shadow:0 3px 0 var(--vert-bas);margin-top:2px;
}
.kc-send:active{transform:translateY(2px);box-shadow:0 1px 0 var(--vert-bas);}
</style>
</head>
<body>
<div class="wrap">

  <!-- Barre TEST -->
  <!-- Écran 0 : accueil -->
  <div class="screen active" id="s-accueil">
    <div class="entete">
      <h1>Automatismes</h1>
      <p>Entraînement à l'épreuve du DNB</p>
    </div>
    <div class="accueil-puces">
      <ul>
        <li>20 minutes · 6 points · sans calculatrice</li>
        <li>Pas besoin de justifier — juste la bonne réponse</li>
        <li>~10 questions, tous les thèmes du programme de 3e</li>
      </ul>
    </div>
    <button class="btn-commencer" onclick="demarrer()">Commencer</button>
  </div>

  <!-- Écran 1 : quiz -->
  <div class="screen" id="s-quiz">
    <div class="entete" style="padding:14px 22px;">
      <h1 style="font-size:1.5rem;">Automatismes</h1>
    </div>

    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div class="q-card">
      <div class="q-num" id="q-num">Question 1 / 10</div>
      <div class="q-badge" id="q-theme">Thème</div>
      <div class="q-texte" id="q-texte">Chargement…</div>

      <!-- Zone options (QCM / VF / saisie) -->
      <div id="zone-opts"></div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-valider" id="btn-valider" onclick="valider()">Valider</button>
        <button class="btn-suite" id="btn-suite" onclick="suite()">Question suivante →</button>
      </div>

      <!-- Feedback -->
      <div class="feedback" id="feedback"></div>

      <!-- Zone brouillon -->
      <div class="brouillon-zone">
        <div class="brouillon-titre">Brouillon (pas de calculatrice)</div>
        <div class="brouillon-sym">
          <button onclick="insererBrouillon('²')">²</button>
          <button onclick="insererBrouillon('³')">³</button>
          <button onclick="insererBrouillon('√')">√</button>
          <button onclick="insererBrouillon('×')">×</button>
          <button onclick="insererBrouillon('÷')">÷</button>
          <button onclick="insererBrouillon('π')">π</button>
          <button onclick="insererBrouillon('≈')">≈</button>
          <button onclick="insererBrouillon('≤')">≤</button>
          <button onclick="insererBrouillon('≥')">≥</button>
          <button onclick="insererBrouillon('°')">°</button>
          <button onclick="insererBrouillon('½')">½</button>
          <button onclick="insererBrouillon('¼')">¼</button>
          <button onclick="insererBrouillon('∈')">∈</button>
          <button onclick="insererBrouillon('⁻¹')">⁻¹</button>
        </div>
        <textarea class="brouillon-txt" id="brouillon-txt" placeholder="Écris ici tes calculs…"></textarea>
      </div>
    </div>
  </div>

  <!-- Écran 2 : résultat final -->
  <div class="screen" id="s-fin">
    <div class="entete">
      <h1>Résultats</h1>
    </div>
    <div class="fin-card">
      <div class="score-cercle" id="score-val">—</div>
      <div class="fin-msg" id="fin-msg">…</div>
      <button class="btn-nouvelle" onclick="demarrer()">Nouvelle session</button>
    </div>
    <div id="revue-zone"></div>
  </div>

</div><!-- /wrap -->

<!-- Calculatrice flottante -->
<button class="kc-fab" onclick="kcToggle()" aria-label="Calculatrice">🖩</button>
<div class="kc-panel" id="kcPanel" hidden>
  <iframe src="calculatrice-college.html" id="kcFrame" style="width:100%;height:590px;border:none;border-radius:10px;display:block" title="Calculatrice"></iframe>
</div>

<script>
/* =====================================================
   UTILITAIRES
===================================================== */
function rnd(n){return Math.floor(Math.random()*n);}
function choix(t){return t[rnd(t.length)];}
function melange(t){
  t=t.slice();
  for(let i=t.length-1;i>0;i--){
    const j=rnd(i+1);
    [t[i],t[j]]=[t[j],t[i]];
  }
  return t;
}
function norm(s){
  return(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'').replace(/,/g,'.');
}
function creerQCM(bonnReponse, faux1, faux2, faux3, explication, q, theme){
  const opts=melange([String(bonnReponse),String(faux1),String(faux2),String(faux3)]);
  const rep=opts.indexOf(String(bonnReponse));
  return {q,type:'qcm',opts,rep,_bon:String(bonnReponse),explication};
}

/* =====================================================
   BADGES COULEUR PAR THÈME
===================================================== */
const THEME_COULEUR={
  'Nombres et calculs':'var(--orange)',
  'Espace et géométrie':'var(--bleu)',
  'Organisation et données':'var(--violet)',
  'Proportionnalité et fonctions':'var(--vert)',
  'Algorithmique':'var(--teal)',
};

/* =====================================================
   BANQUE DE QUESTIONS
   CORRECTIONS v-TEST :
   - eg-01 SUPPRIMÉ (arccos = trigonométrie)
   - Aucune question cos/sin/tan
   - dp-05 reformulée (meilleure note, sans ambiguïté)
   - Niveau légèrement relevé sur nc-02, nc-03, nc-04, nc-08, nc-10
===================================================== */
const BANQUE=[

  /* ---- DOMAINE 1 : Nombres et calculs ---- */

  {
    id:'nc-01',
    theme:'Nombres et calculs',
    gen:()=>{
      // Niveau relevé : dénominateurs et bases plus grands
      const paires=[[1,3],[2,3],[3,4],[1,4],[2,5],[3,5],[4,5]];
      const [n,d]=choix(paires);
      const bases=[18,20,24,30,36,40,45,60];
      let v=choix(bases);
      while((v*n)%d!==0){v=choix(bases);}
      const r=v*n/d;
      return {q:`Quel est le résultat de ${n}/${d} × ${v} ?`,type:'num',rep:r,
        explication:`${n}/${d} × ${v} = (${n} × ${v}) ÷ ${d} = ${n*v} ÷ ${d} = ${r}`};
    }
  },

  {
    id:'nc-02',
    theme:'Nombres et calculs',
    gen:()=>{
      // Liste officielle : "carrés des nombres entiers entre 1 et 12"
      const n=rnd(11)+2;
      return {q:`Quel est le carré de ${n} ?`,type:'num',rep:n*n,
        explication:`${n}² = ${n} × ${n} = ${n*n}`};
    }
  },

  {
    id:'nc-03',
    theme:'Nombres et calculs',
    gen:()=>{
      // Niveau relevé : pourcentages 15, 30, 40 ajoutés ; bases plus variées
      const pcts=[10,15,20,25,30,40,50];
      const bases=[40,60,80,120,150,200,250];
      const pct=choix(pcts);
      const base=choix(bases);
      const r=base*pct/100;
      return {q:`Quel est ${pct}% de ${base} ?`,type:'num',rep:r,
        explication:`${pct}% de ${base} = ${base} × ${pct} ÷ 100 = ${r}`};
    }
  },

  {
    id:'nc-04',
    theme:'Nombres et calculs',
    gen:()=>{
      // Niveau relevé : a entre 3 et 12, x entre 2 et 12
      const a=rnd(10)+3, x=rnd(11)+2, b=a*x;
      return {q:`Résoudre : ${a}x = ${b}`,type:'num',rep:x,
        explication:`x = ${b} ÷ ${a} = ${x}`};
    }
  },

  {
    id:'nc-05',
    theme:'Nombres et calculs',
    gen:()=>{
      const mantissel=[1.5,2.3,3.7,4.1,5.8,6.2,7.9];
      const expos=[3,4,5,6,-1,-2,-3];
      const m=choix(mantissel);
      const e=choix(expos);
      const bon=`${m} × 10^${e}`;
      const f1=`${(m*10).toFixed(1)} × 10^${e-1}`;
      const f2=`${m} × 10^${e+1}`;
      const f3=`${(m/10).toFixed(2)} × 10^${e+1}`;
      const opts=melange([bon,f1,f2,f3]);
      const rep=opts.indexOf(bon);
      return {q:`Quelle est la bonne écriture scientifique pour ${m} × 10^${e} ?`,
        type:'qcm',opts,rep,_bon:bon,
        explication:`${bon} est correct : la mantisse ${m} est bien comprise entre 1 et 10 (strictement).`};
    }
  },

  {
    id:'nc-06',
    theme:'Nombres et calculs',
    gen:()=>{
      // Niveau relevé : a entre 3 et 8, b entre 4 et 14
      const a=rnd(6)+3, b=rnd(11)+4;
      const bon=`${a}x + ${a*b}`;
      const f1=`${a}x + ${b}`;
      const f2=`${a+b}x`;
      const f3=`${a*(b+1)}x`;
      const opts=melange([bon,f1,f2,f3]);
      const rep=opts.indexOf(bon);
      return {q:`Développer : ${a}(x + ${b})`,

let SESSION=[], idx=0, score=0;
let reponseDonnee=null;
let sessionReponses=[];
let essais=0; // nombre d'essais sur la question courante

function demarrer(){
  SESSION=melange(BANQUE).slice(0,10).map(q=>{
    const data=q.gen();
    return {theme:q.theme, data};
  });
  idx=0; score=0; reponseDonnee=null; sessionReponses=[]; essais=0;
  montrerScreen('s-quiz');
  afficherQuestion();
}

function montrerScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* =====================================================
   AFFICHAGE QUESTION
===================================================== */
function progHTML(txt){
  var sep=txt.split(/\n\n/);
  var intro=sep[0]||'';
  var codeTxt=sep[1]||'';
  var suite=sep.slice(2).join('\n\n');
  var lines=codeTxt.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var h='<p class="prog-intro">'+intro+'</p><div class="prog-bloc">';
  lines.forEach(function(l){
    var cls='affectation',ico='●';
    if(/Répéter|fois|Tant que|Pour i/.test(l)){cls='boucle';ico='🔁';}
    else if(/^Si |Sinon/.test(l)){cls='condition';ico='❓';}
    else if(/Afficher/.test(l)){cls='affichage';ico='▶';}
    h+='<div class="prog-ligne '+cls+'"><span class="pico">'+ico+'</span>'+l+'</div>';
  });
  h+='</div>';
  if(suite)h+='<p class="prog-question">'+suite+'</p>';
  return h;
}

function afficherQuestion(){
  const {theme, data}=SESSION[idx];
  reponseDonnee=null;
  essais=0;

  // Progression
  const pct=(idx/SESSION.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';

  // Numéro et thème
  document.getElementById('q-num').textContent=`Question ${idx+1} / ${SESSION.length}`;
  const badge=document.getElementById('q-theme');
  badge.textContent=theme;
  badge.style.background=THEME_COULEUR[theme]||'var(--teal)';

  // Texte
  if(data.prog){
    var el=document.getElementById('q-texte');
    el.innerHTML=progHTML(data.q);
    el.style.whiteSpace='normal';
  }else{
    var el2=document.getElementById('q-texte');
    el2.innerHTML='';
    el2.style.whiteSpace='';
    el2.textContent=data.q;
  }

  // Zone options
  const zone=document.getElementById('zone-opts');
  zone.innerHTML='';

  if(data.type==='qcm'){
    const div=document.createElement('div');
    div.className='opts';
    div.id='opts-zone';
    data.opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='opt';
      btn.textContent=opt;
      btn.dataset.idx=i;
      btn.onclick=()=>selectionnerOpt(i);
      div.appendChild(btn);
    });
    zone.appendChild(div);
  } else if(data.type==='vf'){
    const div=document.createElement('div');
    div.className='vf-opts';
    ['Vrai','Faux'].forEach(label=>{
      const btn=document.createElement('button');
      btn.className='vf-btn '+(label==='Vrai'?'vf-vrai':'vf-faux');
      btn.textContent=label;
      btn.id='btn-'+label.toLowerCase();
      btn.onclick=()=>selectionnerVF(label==='Vrai');
      div.appendChild(btn);
    });
    zone.appendChild(div);
  } else {
    const div=document.createElement('div');
    div.className='saisie-zone';
    const inp=document.createElement('input');
    inp.type='text';
    inp.className='num-input';
    inp.id='num-inp';
    inp.placeholder=data.type==='num'?'Réponse…':'Répondre…';
    inp.autocomplete='off';
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')valider();});
    div.appendChild(inp);
    zone.appendChild(div);
    setTimeout(()=>inp.focus(),100);
  }

  // Reset boutons et feedback
  document.getElementById('btn-valider').disabled=false;
  const fb=document.getElementById('feedback');
  fb.className='feedback';
  fb.innerHTML='';
  const brou=document.getElementById('brouillon-txt');
  if(brou) brou.value='';
  const btnSuite=document.getElementById('btn-suite');
  btnSuite.style.display='none';
}

   SÉLECTION
===================================================== */
function insererBrouillon(sym){
  const t=document.getElementById('brouillon-txt');
  if(!t) return;
  const s=t.selectionStart, e=t.selectionEnd;
  t.value=t.value.slice(0,s)+sym+t.value.slice(e);
  t.selectionStart=t.selectionEnd=s+sym.length;
  t.focus();
}

function selectionnerOpt(i){
  document.querySelectorAll('.opt').forEach(b=>{
    b.classList.toggle('choisi',Number(b.dataset.idx)===i);
  });
  reponseDonnee=i;
}

function selectionnerVF(val){
  reponseDonnee=val;
  const btnV=document.getElementById('btn-vrai');
  const btnF=document.getElementById('btn-faux');
  btnV.classList.toggle('choisi-vrai',val===true);
  btnF.classList.toggle('choisi-faux',val===false);
}

/* =====================================================
   VALIDATION (avec aide après 2 essais, réponse après 3)
===================================================== */
function valider(){
  const {data}=SESSION[idx];
  let ok=false;
  let repStr='';

  if(data.type==='qcm'){
    if(reponseDonnee===null){reponseDonnee=rnd(data.opts.length);}
    ok=(reponseDonnee===data.rep);
    repStr=data.opts[reponseDonnee];
  } else if(data.type==='vf'){
    if(reponseDonnee===null){reponseDonnee=Math.random()>.5;}
    ok=(reponseDonnee===data.rep);
    repStr=reponseDonnee?'Vrai':'Faux';
  } else if(data.type==='num'){
    const inp=document.getElementById('num-inp');
    const val=parseFloat((inp?inp.value:'').replace(',','.'));
    repStr=inp?inp.value:'—';
    if(!isNaN(val)){
      const tol=data.tol!==undefined?data.tol:0;
      if(tol===0){ok=(val===data.rep);}
      else{ok=(Math.abs(val-data.rep)<=tol);}
    }
  } else if(data.type==='court'){
    const inp=document.getElementById('num-inp');
    repStr=inp?inp.value:'—';
    ok=(norm(repStr)===norm(String(data.rep)));
  }

  essais++;

  // Si correct : valider définitivement
  if(ok){
    // Désactiver les entrées
    _desactiverEntree(data);
    score++;
    sessionReponses.push({ok:true, repStr, data, theme:SESSION[idx].theme});

    const fb=document.getElementById('feedback');
    fb.className='feedback bon';
    fb.innerHTML='Exact !';
    document.getElementById('btn-valider').disabled=true;
    document.getElementById('btn-suite').style.display='inline-block';
    return;
  }

  // Pas correct
  // Après 2 essais : donner un indice (explication partielle)
  // Après 3 essais : donner la réponse et passer
  const fb=document.getElementById('feedback');

  if(essais===1){
    fb.className='feedback mauvais';
    fb.innerHTML='Pas tout à fait… Réessaie !';
    // Remettre le champ num disponible
    const inp=document.getElementById('num-inp');
    if(inp){inp.value='';inp.disabled=false;inp.focus();}
  } else if(essais===2){
    fb.className='feedback mauvais';
    fb.innerHTML='Encore raté. Indice : <span class="expl">'+( data.explication||'Relis l\'énoncé.')+'</span>';
    const inp=document.getElementById('num-inp');
    if(inp){inp.value='';inp.disabled=false;inp.focus();}
  } else {
    // 3e essai ou plus : montrer la réponse et forcer la suite
    _desactiverEntree(data);
    const bonneRep=data.type==='qcm'?(data._bon||data.opts[data.rep])
      :data.type==='vf'?(data.rep?'Vrai':'Faux')
      :String(data.rep);
    fb.className='feedback mauvais';
    fb.innerHTML='La bonne réponse était : <strong>'+bonneRep+'</strong><div class="expl">'+(data.explication||'')+'</div>';
    sessionReponses.push({ok:false, repStr, data, theme:SESSION[idx].theme});
    document.getElementById('btn-valider').disabled=true;
    document.getElementById('btn-suite').style.display='inline-block';
    // Colorier la bonne réponse QCM
    if(data.type==='qcm'){
      document.querySelectorAll('.opt').forEach((b,i)=>{
        b.disabled=true;
        if(i===data.rep)b.classList.add('bon');
      });
    }
    if(data.type==='vf'){
      const btnV=document.getElementById('btn-vrai');
      const btnF=document.getElementById('btn-faux');
      if(btnV)btnV.disabled=true;
      if(btnF)btnF.disabled=true;
      if(data.rep===true&&btnV)btnV.style.outline='3px solid var(--vert-bas)';
      if(data.rep===false&&btnF)btnF.style.outline='3px solid var(--vert-bas)';
    }
  }
}

function _desactiverEntree(data){
  if(data.type==='qcm'){
    document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;});
  }
  if(data.type==='vf'){
    const btnV=document.getElementById('btn-vrai');
    const btnF=document.getElementById('btn-faux');
    if(btnV)btnV.disabled=true;
    if(btnF)btnF.disabled=true;
  }
  if(data.type==='num'||data.type==='court'){
    const inp=document.getElementById('num-inp');
    if(inp)inp.disabled=true;
  }
}

/* =====================================================
   SUITE / FIN
===================================================== */
function suite(){
  idx++;
  if(idx>=SESSION.length){
    afficherFin();
  } else {
    afficherQuestion();
  }
}

function sautQuestion(){
  valider();
}

/* =====================================================
   ÉCRAN FIN
===================================================== */
function afficherFin(){
  montrerScreen('s-fin');

  document.getElementById('score-val').textContent=`${score} / ${SESSION.length}`;

  let msg='';
  if(score>=9){msg='Excellent ! Tu es prêt(e) pour le brevet.';}
  else if(score>=7){msg='Très bien ! Quelques automatismes à revoir.';}
  else if(score>=5){msg='Bien. Entraîne-toi encore sur les points difficiles.';}
  else{msg='Continue à t\'entraîner. Les automatismes s\'améliorent avec la répétition.';}
  document.getElementById('fin-msg').textContent=msg;

  document.getElementById('prog-fill').style.width='100%';

  const zone=document.getElementById('revue-zone');
  zone.innerHTML='';
  const titre=document.createElement('div');
  titre.className='revue-titre';
  titre.textContent='Correction détaillée';
  zone.appendChild(titre);

  sessionReponses.forEach((r,i)=>{
    const item=document.createElement('div');
    item.className='revue-item '+(r.ok?'bon':'mauvais');

    const check=document.createElement('div');
    check.className='revue-check';
    check.textContent=r.ok?'✓':'✗';

    const contenu=document.createElement('div');
    contenu.className='revue-contenu';

    const qTxt=document.createElement('div');
    qTxt.className='revue-q';
    qTxt.textContent=`Q${i+1}. ${r.data.q}`;

    const reps=document.createElement('div');
    reps.className='revue-reps';

    const bonneRep=r.data.type==='qcm'?(r.data._bon||r.data.opts[r.data.rep])
      :r.data.type==='vf'?(r.data.rep?'Vrai':'Faux')
      :String(r.data.rep);

    if(r.ok){
      reps.innerHTML=`<span class="bon-rep">✓ ${bonneRep}</span>`;
    } else {
      reps.innerHTML=`<span class="ta-rep">Ta réponse : ${r.repStr}</span><br>`
        +`<span class="bon-rep">Bonne réponse : ${bonneRep}</span><br>`
        +`<span class="expl">${r.data.explication||''}</span>`;
    }

    contenu.appendChild(qTxt);
    contenu.appendChild(reps);
    item.appendChild(check);
    item.appendChild(contenu);
    zone.appendChild(item);
  });
}

/* ===== CALCULATRICE ===== */
function kcToggle(){var p=gid('kcPanel');p.hidden=!p.hidden;}
window.addEventListener('message',function(e){
  if(!e.data||e.data.type!=='kc-send')return;
  var val=String(e.data.value);
  var inp=document.querySelector('.screen.active #tq_input')||
          document.querySelector('.screen.active #aq_input')||
          document.querySelector('#tq_input')||document.querySelector('#aq_input');
  if(inp){inp.value=val;inp.dispatchEvent(new Event('input'));}
  gid('kcPanel').hidden=true;
});
</script>
